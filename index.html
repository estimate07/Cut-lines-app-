<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scene Cut Splitter</title>
<meta name="description" content="Split Step 1 output into copy-ready scene cut prompts. Offline.">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cut Splitter">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<!-- Notebook-skin handwriting fonts. Cached by the service worker after the
     first online visit; if never fetched, the skin falls back to system fonts. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1d212b;
    --line:#2a2f3c;
    --ink:#e8eaf0;
    --ink-dim:#9aa1b2;
    --ink-faint:#6b7280;
    --accent:#f59a3c;
    --accent-soft:rgba(245,154,60,.14);
    --new:#4cc38a;
    --new-soft:rgba(76,195,138,.13);
    --same:#6ea8fe;
    --same-soft:rgba(110,168,254,.13);
    --radius:16px;
    --radius-sm:10px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  /* ---------- light theme palette ---------- */
  :root[data-theme="light"]{
    --bg:#f4f6f9;
    --panel:#ffffff;
    --panel-2:#eceff4;
    --line:#dce0e8;
    --ink:#1a1d24;
    --ink-dim:#57607a;
    --ink-faint:#8891a6;
    --accent-soft:rgba(245,154,60,.16);
    --new:#279a63;
    --new-soft:rgba(39,154,99,.14);
    --same:#3072d6;
    --same-soft:rgba(48,114,214,.14);
  }
  :root[data-theme="light"] .card:hover{border-color:#c3c9d6}
  :root[data-theme="light"] ::-webkit-scrollbar-thumb{background:#c8cdd8}
  /* auto: follow phone setting when no manual choice */
  @media (prefers-color-scheme:light){
    :root:not([data-theme="dark"]){
      --bg:#f4f6f9;
      --panel:#ffffff;
      --panel-2:#eceff4;
      --line:#dce0e8;
      --ink:#1a1d24;
      --ink-dim:#57607a;
      --ink-faint:#8891a6;
      --accent-soft:rgba(245,154,60,.16);
      --new:#279a63;
      --new-soft:rgba(39,154,99,.14);
      --same:#3072d6;
      --same-soft:rgba(48,114,214,.14);
    }
    :root:not([data-theme="dark"]) .card:hover{border-color:#c3c9d6}
    :root:not([data-theme="dark"]) ::-webkit-scrollbar-thumb{background:#c8cdd8}
  }
  /* ---------- colorblind-safe palette (Okabe-Ito) ---------- */
  :root[data-cb="1"]{
    --new:#009e73;
    --new-soft:rgba(0,158,115,.15);
    --same:#cc79a7;
    --same-soft:rgba(204,121,167,.16);
  }
  :root[data-cb="1"] .badge.new::before{content:"\25C6\00a0"}
  :root[data-cb="1"] .badge.same::before{content:"\25CF\00a0"}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.55;
    min-height:100vh;
    padding:22px 16px calc(60px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:820px;margin:0 auto}

  /* ---------- header ---------- */
  header{margin-bottom:22px}
  .brand{
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .brand h1{
    font-size:20px;font-weight:700;letter-spacing:.2px;
  }
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--accent);
    align-self:center;
    box-shadow:0 0 12px rgba(245,154,60,.55);
  }
  .brand small{color:var(--ink-faint);font-size:12.5px;font-weight:500}
  .head-btns{margin-left:auto;align-self:center;display:flex;gap:8px}
  .icon-btn{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:999px;
    background:var(--panel);border:1px solid var(--line);
    color:var(--ink-dim);
    transition:color .18s,border-color .18s,transform .12s;
    -webkit-tap-highlight-color:transparent;
  }
  .icon-btn:hover{color:var(--ink);border-color:var(--ink-faint)}
  .icon-btn:active{transform:scale(.94)}
  .icon-btn svg{width:17px;height:17px}
  .icon-btn.on{color:var(--accent);border-color:var(--accent)}
  .brand{width:100%}

  /* ---------- input panel ---------- */
  .inputs{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    display:flex;flex-direction:column;gap:14px;
  }
  .field label{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;
    letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:7px;
  }
  .field label .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:18px;height:18px;border-radius:6px;
    background:var(--accent-soft);color:var(--accent);
    font-size:11px;font-weight:700;
  }
  .field label .hint{
    margin-left:auto;font-size:10px;font-weight:500;
    letter-spacing:.3px;text-transform:none;color:var(--ink-faint);
  }
  textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12.5px;
    line-height:1.5;
    padding:11px 12px;
    resize:vertical;
    outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  textarea::placeholder{color:var(--ink-faint)}
  textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  #resultInput{min-height:120px;max-height:220px}
  #promptInput{min-height:72px;max-height:150px}

  .actions{display:flex;gap:10px;align-items:center}
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:600;
    border-radius:var(--radius-sm);
    transition:transform .12s, background .18s, color .18s, box-shadow .18s, border-color .18s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97)}
  .btn-generate{
    flex:1;
    background:var(--accent);
    color:#141005;
    font-size:14.5px;
    padding:12px 18px;
    box-shadow:0 4px 18px rgba(245,154,60,.28);
  }
  .btn-generate:hover{background:#ffab53}
  .btn-clear{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:13px;
    padding:11px 16px;
  }
  .btn-clear:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-clear.undo{color:var(--accent);border-color:var(--accent)}

  /* ---------- status strip ---------- */
  .status{
    display:none;
    margin:18px 2px 4px;
    font-size:12.5px;font-weight:600;
    letter-spacing:.4px;
    color:var(--ink-dim);
  }
  .status.show{display:flex;gap:14px;flex-wrap:wrap}
  .status b{color:var(--ink)}
  .status .pill-new{color:var(--new)}
  .status .pill-same{color:var(--same)}
  .status .pill-merge{color:var(--accent)}
  .status .err{color:#ff7d7d}

  /* ---------- session dashboard ---------- */
  .dash{
    display:none;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-top:14px;
    overflow:hidden;
  }
  .dash.show{display:block}
  .dash summary{
    cursor:pointer;list-style:none;
    display:flex;align-items:center;gap:8px;
    padding:13px 14px;
    font-size:12px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-dim);
    -webkit-tap-highlight-color:transparent;
  }
  .dash summary::-webkit-details-marker{display:none}
  .dash summary .chev{margin-left:auto;transition:transform .2s;font-size:11px}
  .dash[open] summary .chev{transform:rotate(180deg)}
  .dash-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:14px}
  .dash-h{
    font-size:10.5px;font-weight:700;letter-spacing:.7px;
    text-transform:uppercase;color:var(--ink-faint);
    margin-bottom:6px;
  }
  .ratio{display:flex;height:10px;border-radius:999px;overflow:hidden;background:var(--panel-2)}
  .ratio i{display:block;height:100%}
  .ratio .r-new{background:var(--new)}
  .ratio .r-same{background:var(--same)}
  .ratio-legend{
    display:flex;gap:16px;flex-wrap:wrap;
    font-size:11.5px;font-weight:600;color:var(--ink-dim);
    margin-top:7px;
  }
  .ratio-legend .sw{
    display:inline-block;width:8px;height:8px;border-radius:2px;
    margin-right:5px;
  }
  .ratio-legend .sw.n{background:var(--new)}
  .ratio-legend .sw.s{background:var(--same)}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:10px}
  .tile{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:10px 12px;
  }
  .tile b{display:block;font-size:17px;font-family:var(--mono);color:var(--ink);line-height:1.3}
  .tile span{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-faint)}
  .cost-row{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-size:12.5px;color:var(--ink-dim);
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .cost-row input{
    width:80px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    font-family:var(--mono);
    font-size:12px;
    padding:5px 8px;
    outline:none;
  }
  .cost-row input:focus{border-color:var(--accent)}
  .cost-row b{color:var(--ink);font-family:var(--mono);font-size:13.5px}
  .cost-row #imgsOut{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
  .cost-row input#imgsInput{width:56px}
  .dist{display:flex;flex-direction:column;gap:6px}
  .dist-row{
    display:grid;grid-template-columns:66px 1fr 64px;
    align-items:center;gap:8px;
    font-size:11.5px;color:var(--ink-dim);
  }
  .dist-row .lbl{font-family:var(--mono);white-space:nowrap}
  .dist-row .bar{height:8px;border-radius:999px;background:var(--panel-2);overflow:hidden}
  .dist-row .bar i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .dist-row .val{text-align:right;font-family:var(--mono);white-space:nowrap}
  .dash-actions{display:flex;justify-content:flex-end}
  .btn-print{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:12px;font-weight:600;
    padding:8px 14px;
    border-radius:999px;
  }
  .btn-print:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-print svg{width:13px;height:13px}

  /* ---------- cut cards ---------- */
  #cards{display:flex;flex-direction:column;gap:0;margin-top:14px}
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:14px;
    animation:rise .35s cubic-bezier(.2,.7,.3,1) both;
    transition:border-color .2s, opacity .25s;
  }
  .card.linked{margin-bottom:0}
  .card:hover{border-color:#3a4152}
  .card.done{opacity:.55}
  .card.done:hover{opacity:.85}
  .card.done .cut-no::after{content:" \2713";color:var(--new)}
  @keyframes rise{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:none}
  }
  .card-head{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .cut-no{
    font-family:var(--mono);
    font-size:14px;font-weight:700;
    color:var(--ink);
    white-space:nowrap;
  }
  .was{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .badge{
    font-size:10.5px;font-weight:700;
    letter-spacing:.7px;
    padding:4px 9px;border-radius:999px;
    white-space:nowrap;
  }
  .badge.new{background:var(--new-soft);color:var(--new)}
  .badge.same{background:var(--same-soft);color:var(--same)}
  .card-head .btn-copy{margin-left:auto}
  .btn-copy{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:12px;font-weight:600;
    padding:7px 13px;
    border-radius:999px;
  }
  .btn-copy:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-copy.copied{
    background:var(--new-soft);
    border-color:transparent;
    color:var(--new);
  }
  .btn-copy svg{width:13px;height:13px;flex:none}

  .vo-line{
    padding:10px 14px 0;
    font-size:var(--read-fs,12.5px);
    line-height:1.5;
    color:var(--ink-dim);
    font-style:italic;
  }
  .vo-line b{color:var(--ink);font-style:normal;font-weight:600}

  .card-body{padding:14px}
  .desc-box{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:12px 13px;
    max-height:300px;
    overflow-y:auto;
    font-family:var(--mono);
    font-size:var(--read-fs,12px);
    line-height:1.6;
    color:var(--ink-dim);
    white-space:pre-wrap;
    word-break:break-word;
    -webkit-overflow-scrolling:touch;
  }
  .desc-box .style-part{color:var(--ink-faint)}
  .desc-box .divider{
    display:block;
    border:none;border-top:1px dashed var(--line);
    margin:10px 0;
  }
  .desc-box .scene-part{color:var(--ink)}

  .cut-meta{
    display:flex;gap:12px;flex-wrap:wrap;
    margin-top:9px;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--ink-faint);
  }

  .framing{
    display:flex;align-items:center;gap:8px;
    margin-top:11px;
    font-size:12.5px;font-weight:600;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .framing span{color:var(--ink);font-weight:500}

  /* ---------- animated connector ---------- */
  .connector{
    width:3px;height:34px;
    margin:0 auto;
    border-radius:3px;
    background:repeating-linear-gradient(
      to bottom,
      var(--same) 0 6px,
      transparent 6px 12px
    );
    background-size:100% 24px;
    animation:flow 1.1s linear infinite;
    opacity:.85;
  }
  @keyframes flow{
    from{background-position:0 0}
    to{background-position:0 24px}
  }

  .empty{
    display:none;
    text-align:center;
    color:var(--ink-faint);
    font-size:13.5px;
    padding:46px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    margin-top:16px;
  }
  .empty.show{display:block}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2e3442;border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  @media (max-width:520px){
    body{padding:16px 10px calc(48px + env(safe-area-inset-bottom))}
    .inputs{padding:13px}
    .card-head{padding:10px 12px}
    .card-body{padding:12px}
  }

  /* ---------- projects bar (#29) ---------- */
  .projects{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    margin-bottom:12px;
  }
  .projects select{
    flex:1;min-width:120px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--ink);
    font-family:var(--sans);font-size:13px;font-weight:600;
    padding:9px 11px;
    outline:none;
    -webkit-tap-highlight-color:transparent;
  }
  .projects select:focus{border-color:var(--accent)}
  .mini-btn{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:5px;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:var(--sans);font-size:12.5px;font-weight:600;
    padding:9px 12px;border-radius:var(--radius-sm);
    transition:color .18s,border-color .18s,transform .12s;
    -webkit-tap-highlight-color:transparent;
    white-space:nowrap;
  }
  .mini-btn:hover{color:var(--ink);border-color:var(--ink-faint)}
  .mini-btn:active{transform:scale(.95)}
  .mini-btn svg{width:14px;height:14px}
  .mini-btn.danger:hover{color:#ff7d7d;border-color:#ff7d7d}

  /* ---------- paste buttons (#48) ---------- */
  .field label .paste-btn{
    margin-left:auto;
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:4px;
    background:var(--accent-soft);
    border:1px solid transparent;
    color:var(--accent);
    font-family:var(--sans);font-size:10px;font-weight:700;
    letter-spacing:.4px;text-transform:uppercase;
    padding:4px 9px;border-radius:999px;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s;
  }
  .field label .paste-btn:active{transform:scale(.93)}
  .field label .paste-btn svg{width:11px;height:11px}
  .field label .hint + .paste-btn{margin-left:8px}

  /* ---------- style presets (#36) ---------- */
  .presets{
    display:flex;align-items:center;gap:7px;flex-wrap:wrap;
    margin-top:8px;
  }
  .presets select{
    flex:1;min-width:110px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    font-family:var(--sans);font-size:12px;font-weight:600;
    padding:7px 9px;outline:none;
  }
  .presets select:focus{border-color:var(--accent)}
  .presets .mini-btn{padding:7px 10px;font-size:11.5px}

  /* ---------- cards toolbar (#2 #4 #12 #14) ---------- */
  .toolbar{
    display:none;
    flex-direction:column;gap:11px;
    margin-top:14px;
  }
  .toolbar.show{display:flex}
  .progress-wrap{display:flex;flex-direction:column;gap:6px}
  .progress-top{
    display:flex;align-items:center;justify-content:space-between;
    font-size:11.5px;font-weight:600;color:var(--ink-dim);
  }
  .progress-top b{color:var(--new);font-family:var(--mono)}
  .progress-bar{
    height:8px;border-radius:999px;
    background:var(--panel-2);overflow:hidden;
    border:1px solid var(--line);
  }
  .progress-bar i{
    display:block;height:100%;width:0;
    background:var(--new);border-radius:999px;
    transition:width .3s cubic-bezier(.2,.7,.3,1);
  }
  .tool-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .chip{
    appearance:none;cursor:pointer;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:var(--sans);font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:999px;
    transition:color .16s,border-color .16s,background .16s,transform .12s;
    -webkit-tap-highlight-color:transparent;
    white-space:nowrap;
  }
  .chip:active{transform:scale(.95)}
  .chip:hover{color:var(--ink);border-color:var(--ink-faint)}
  .chip.on{
    background:var(--accent-soft);
    border-color:var(--accent);
    color:var(--accent);
  }
  .chip .cnt{opacity:.7;font-family:var(--mono);font-size:11px}
  .tool-row .spacer{flex:1}
  .btn-copynext{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:7px;
    background:var(--new);
    border:none;
    color:#08120c;
    font-family:var(--sans);font-size:13px;font-weight:700;
    padding:9px 15px;border-radius:999px;
    box-shadow:0 3px 14px rgba(76,195,138,.3);
    transition:transform .12s,background .18s,opacity .18s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn-copynext:active{transform:scale(.96)}
  .btn-copynext:disabled{
    opacity:.5;cursor:default;box-shadow:none;
    background:var(--panel-2);color:var(--ink-faint);
  }
  .btn-copynext svg{width:14px;height:14px}

  /* ---------- session compare (#44) ---------- */
  .compare{
    display:none;align-items:center;gap:10px;flex-wrap:wrap;
    margin-top:12px;
    background:var(--same-soft);
    border-radius:var(--radius-sm);
    padding:9px 13px;
    font-size:12px;font-weight:600;color:var(--ink-dim);
  }
  .compare.show{display:flex}
  .compare .up{color:var(--new)}
  .compare .down{color:#ff9d7d}
  .compare .flat{color:var(--ink-faint)}

  /* ---------- card additions ---------- */
  .card.flagged{border-color:var(--accent)}
  .card.flagged .card-head{background:var(--accent-soft)}
  .card.collapsed .card-body,
  .card.collapsed .vo-line{display:none}
  .card.collapsed{margin-bottom:8px}
  .card.dup .cut-no::before{content:"\29C9 ";color:var(--same);font-weight:400}
  .card-head .card-tools{display:flex;align-items:center;gap:6px;margin-left:auto}
  .icon-mini{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    width:30px;height:30px;border-radius:8px;
    background:transparent;border:1px solid var(--line);
    color:var(--ink-faint);
    transition:color .16s,border-color .16s,background .16s,transform .12s;
    -webkit-tap-highlight-color:transparent;
  }
  .icon-mini:hover{color:var(--ink);border-color:var(--ink-faint)}
  .icon-mini:active{transform:scale(.92)}
  .icon-mini svg{width:14px;height:14px}
  .icon-mini.flag.on{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}
  .card-head .btn-copy{margin-left:0}

  /* ---------- small order label (1..last) + scene index ---------- */
  .ord{
    display:inline-flex;align-items:center;justify-content:center;
    min-width:22px;height:20px;padding:0 6px;
    border-radius:6px;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:var(--mono);font-size:11px;font-weight:700;
    white-space:nowrap;
  }
  .card.flash{animation:flashcard 1.3s ease}
  @keyframes flashcard{
    0%,100%{box-shadow:0 0 0 0 rgba(245,154,60,0)}
    12%{box-shadow:0 0 0 3px var(--accent-soft)}
  }
  .scene-index{
    display:none;flex-direction:column;gap:12px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:13px 14px;
    margin-top:14px;
  }
  .scene-index.show{display:flex}
  .si-group{display:flex;flex-direction:column;gap:8px}
  .si-head{
    display:flex;align-items:center;gap:8px;
    font-size:10.5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-faint);
  }
  .si-head .dotc{width:9px;height:9px;border-radius:2px;flex:none}
  .si-head .dotc.n{background:var(--new)}
  .si-head .dotc.p{background:var(--same)}
  .si-head .si-cnt{margin-left:auto;font-family:var(--mono);color:var(--ink-dim);font-size:11px}
  .si-nums{display:flex;flex-wrap:wrap;gap:6px}
  .si-num{
    appearance:none;cursor:pointer;
    min-width:30px;height:30px;padding:0 8px;
    border-radius:8px;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--ink);
    font-family:var(--mono);font-size:12.5px;font-weight:700;
    transition:transform .12s,border-color .16s,color .16s,background .16s,opacity .16s;
    -webkit-tap-highlight-color:transparent;
  }
  .si-num:hover{border-color:var(--ink-faint)}
  .si-num:active{transform:scale(.9)}
  .si-num.flagged{border-color:var(--accent);color:var(--accent)}
  .si-num.done{opacity:.4;text-decoration:line-through}
  .si-empty{font-size:11.5px;color:var(--ink-faint);font-family:var(--mono)}

  /* ---------- currency toggle (#37) ---------- */
  .cur-toggle{display:inline-flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .cur-toggle button{
    appearance:none;cursor:pointer;
    background:var(--panel);border:none;
    color:var(--ink-dim);
    font-family:var(--mono);font-size:11.5px;font-weight:700;
    padding:5px 10px;
    -webkit-tap-highlight-color:transparent;
  }
  .cur-toggle button.on{background:var(--accent);color:#141005}

  /* ---------- floating buttons (#50) ---------- */
  .fab{
    position:fixed;
    right:16px;
    bottom:calc(18px + env(safe-area-inset-bottom));
    width:44px;height:44px;border-radius:50%;
    display:none;align-items:center;justify-content:center;
    background:var(--panel);
    border:1px solid var(--line);
    color:var(--ink-dim);
    cursor:pointer;
    box-shadow:0 4px 16px rgba(0,0,0,.3);
    z-index:40;
    -webkit-tap-highlight-color:transparent;
    transition:transform .12s,color .18s,border-color .18s;
  }
  .fab.show{display:inline-flex}
  .fab:active{transform:scale(.92)}
  .fab svg{width:20px;height:20px}

  /* ---------- history + changelog modal (#35 #60) ---------- */
  .modal-back{
    display:none;position:fixed;inset:0;
    background:rgba(0,0,0,.55);
    z-index:60;
    align-items:flex-end;justify-content:center;
    padding:0;
  }
  .modal-back.show{display:flex}
  .modal{
    width:100%;max-width:520px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius) var(--radius) 0 0;
    max-height:80vh;overflow-y:auto;
    padding:18px 16px calc(20px + env(safe-area-inset-bottom));
    animation:sheet .28s cubic-bezier(.2,.7,.3,1) both;
  }
  @keyframes sheet{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  @media (min-width:560px){
    .modal-back{align-items:center}
    .modal{border-radius:var(--radius);max-height:82vh}
  }
  .modal-head{
    display:flex;align-items:center;gap:10px;margin-bottom:14px;
  }
  .modal-head h3{font-size:15px;font-weight:700;color:var(--ink)}
  .modal-head .mini-btn{margin-left:auto}
  .hist-item{
    display:flex;align-items:center;gap:10px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:11px 12px;margin-bottom:9px;
  }
  .hist-item .hi-main{flex:1;min-width:0}
  .hist-item .hi-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hist-item .hi-sub{font-size:11px;color:var(--ink-faint);font-family:var(--mono);margin-top:2px}
  .hist-empty{color:var(--ink-faint);font-size:13px;text-align:center;padding:24px 0}
  .change-log{font-size:12.5px;color:var(--ink-dim);line-height:1.7}
  .change-log b{color:var(--ink)}
  .change-log ul{margin:4px 0 12px 18px}
  .change-log li{margin-bottom:3px}

  /* ---------- version footer (#60) ---------- */
  .footer{
    margin-top:26px;text-align:center;
    font-size:11px;color:var(--ink-faint);
  }
  .footer button{
    appearance:none;background:none;border:none;cursor:pointer;
    color:var(--ink-faint);font:inherit;
    text-decoration:underline;text-underline-offset:2px;
    -webkit-tap-highlight-color:transparent;
  }
  .footer button:hover{color:var(--ink-dim)}

  /* ========================================================
     NEW FEATURES (v2.1)
     ======================================================== */

  /* ---------- merged view: all script lines in one tab (B) ---------- */
  .card.merged{padding:4px 0 6px}
  .card.merged .merged-head{
    display:flex;align-items:center;gap:10px;
    padding:12px 14px;border-bottom:1px solid var(--line);
    background:var(--panel-2);
    font-size:12px;font-weight:700;letter-spacing:.5px;
    text-transform:uppercase;color:var(--ink-dim);
  }
  .card.merged .merged-head .mh-cnt{margin-left:auto;font-family:var(--mono);color:var(--ink-faint);text-transform:none}
  .mrow{
    display:flex;align-items:flex-start;gap:10px;
    padding:10px 14px;
    border-bottom:1px solid var(--line);
    transition:background .16s,opacity .2s;
  }
  .mrow:last-child{border-bottom:none}
  .mrow.done{opacity:.5}
  .mrow.flagged{background:var(--accent-soft)}
  .mrow .mno{
    font-family:var(--mono);font-size:12px;font-weight:700;
    color:var(--ink);white-space:nowrap;padding-top:2px;min-width:44px;
  }
  .mrow .mdot{
    width:8px;height:8px;border-radius:2px;flex:none;margin-top:6px;
  }
  .mrow .mdot.n{background:var(--new)}
  .mrow .mdot.s{background:var(--same)}
  .mrow .mtext{
    flex:1;min-width:0;
    font-size:var(--read-fs,12.5px);line-height:1.5;color:var(--ink);
    word-break:break-word;
  }
  .mrow .mtext .mmuted{color:var(--ink-faint);font-style:italic}
  .mrow .mcopy{
    appearance:none;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;justify-content:center;
    width:32px;height:32px;border-radius:8px;
    background:transparent;border:1px solid var(--line);
    color:var(--ink-dim);
    -webkit-tap-highlight-color:transparent;
    transition:color .16s,border-color .16s,background .16s,transform .12s;
  }
  .mrow .mcopy:active{transform:scale(.9)}
  .mrow .mcopy:hover{color:var(--ink);border-color:var(--ink-faint)}
  .mrow .mcopy.copied{background:var(--new-soft);border-color:transparent;color:var(--new)}
  .mrow .mcopy svg{width:15px;height:15px}

  /* merge toggle chip lives in the toolbar */
  .toggle-chip{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel);border:1px solid var(--line);
    color:var(--ink-dim);
    font-family:var(--sans);font-size:12px;font-weight:600;
    padding:7px 12px;border-radius:999px;
    -webkit-tap-highlight-color:transparent;
    transition:color .16s,border-color .16s,background .16s,transform .12s;
    white-space:nowrap;
  }
  .toggle-chip:active{transform:scale(.95)}
  .toggle-chip:hover{color:var(--ink);border-color:var(--ink-faint)}
  .toggle-chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .toggle-chip svg{width:14px;height:14px}

  /* ---------- resume banner (25) ---------- */
  .resume-bar{
    display:none;align-items:center;gap:11px;
    margin-top:14px;
    background:var(--new-soft);
    border:1px solid var(--new);
    border-radius:var(--radius-sm);
    padding:11px 13px;
  }
  .resume-bar.show{display:flex}
  .resume-bar .rb-txt{flex:1;min-width:0;font-size:12.5px;font-weight:600;color:var(--ink)}
  .resume-bar .rb-txt small{display:block;font-weight:500;color:var(--ink-dim);font-size:11px;margin-top:1px}
  .resume-bar .rb-go{
    appearance:none;cursor:pointer;flex:none;
    display:inline-flex;align-items:center;gap:6px;
    background:var(--new);border:none;color:#08120c;
    font-family:var(--sans);font-size:12.5px;font-weight:700;
    padding:8px 13px;border-radius:999px;
    -webkit-tap-highlight-color:transparent;transition:transform .12s;
  }
  .resume-bar .rb-go:active{transform:scale(.96)}
  .resume-bar .rb-x{
    appearance:none;cursor:pointer;flex:none;
    width:28px;height:28px;border-radius:999px;
    background:transparent;border:1px solid var(--line);color:var(--ink-faint);
    -webkit-tap-highlight-color:transparent;font-size:15px;line-height:1;
  }
  .resume-bar .rb-x:hover{color:var(--ink)}

  /* ---------- bottom action bar (23) ---------- */
  .bottombar{
    display:none;
    position:fixed;left:0;right:0;
    bottom:0;
    z-index:45;
    align-items:center;gap:10px;
    padding:9px 14px calc(9px + env(safe-area-inset-bottom));
    background:color-mix(in srgb, var(--panel) 92%, transparent);
    -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);
  }
  .bottombar.show{display:flex}
  body.has-bottombar{padding-bottom:calc(88px + env(safe-area-inset-bottom))}
  .bottombar .bb-prog{
    display:flex;flex-direction:column;gap:3px;min-width:66px;
  }
  .bottombar .bb-prog b{font-family:var(--mono);font-size:12.5px;color:var(--ink)}
  .bottombar .bb-prog .bb-mini{
    height:5px;width:64px;border-radius:999px;background:var(--panel-2);overflow:hidden;
  }
  .bottombar .bb-prog .bb-mini i{display:block;height:100%;width:0;background:var(--new);transition:width .3s}
  .bottombar .bb-next{
    flex:1;appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:7px;
    background:var(--new);border:none;color:#08120c;
    font-family:var(--sans);font-size:14px;font-weight:700;
    padding:12px 15px;border-radius:999px;
    box-shadow:0 3px 14px rgba(76,195,138,.3);
    -webkit-tap-highlight-color:transparent;transition:transform .12s,opacity .18s,background .18s;
  }
  .bottombar .bb-next:active{transform:scale(.97)}
  .bottombar .bb-next:disabled{opacity:.5;cursor:default;box-shadow:none;background:var(--panel-2);color:var(--ink-faint)}
  .bottombar .bb-next svg{width:15px;height:15px}
  .bottombar .bb-top{
    flex:none;appearance:none;cursor:pointer;
    width:44px;height:44px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;
    background:var(--panel);border:1px solid var(--line);color:var(--ink-dim);
    -webkit-tap-highlight-color:transparent;transition:transform .12s,color .18s;
  }
  .bottombar .bb-top:active{transform:scale(.92)}
  .bottombar .bb-top svg{width:19px;height:19px}
  /* nudge the scroll-to-top FAB above the bottom bar when it shows */
  body.has-bottombar .fab{bottom:calc(84px + env(safe-area-inset-bottom))}

  /* ---------- settings: density + font size (26) ---------- */
  .set-group{margin-bottom:18px}
  .set-group .set-h{
    font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-faint);margin-bottom:9px;
  }
  .seg{display:flex;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{
    flex:1;appearance:none;cursor:pointer;
    background:var(--panel);border:none;border-right:1px solid var(--line);
    color:var(--ink-dim);font-family:var(--sans);font-size:13px;font-weight:600;
    padding:10px 8px;-webkit-tap-highlight-color:transparent;transition:background .16s,color .16s;
  }
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent-soft);color:var(--accent)}
  .fs-row{display:flex;align-items:center;gap:12px}
  .fs-row input[type=range]{flex:1;accent-color:var(--accent);height:26px}
  .fs-row .fs-val{font-family:var(--mono);font-size:12.5px;color:var(--ink);min-width:44px;text-align:right}
  .fs-preview{
    margin-top:11px;padding:11px 12px;border:1px dashed var(--line);border-radius:var(--radius-sm);
    background:var(--panel-2);color:var(--ink-dim);
    font-family:var(--mono);font-size:var(--read-fs,12px);line-height:1.5;
  }
  .set-reset{margin-top:2px}

  /* ---------- density: compact (26) ---------- */
  :root[data-density="compact"] .card-head{padding:8px 12px}
  :root[data-density="compact"] .card-body{padding:9px 12px}
  :root[data-density="compact"] .vo-line{padding:7px 12px 0}
  :root[data-density="compact"] .desc-box{padding:9px 10px;max-height:210px}
  :root[data-density="compact"] .card{margin-bottom:9px}
  :root[data-density="compact"] .cut-meta{margin-top:6px}
  :root[data-density="compact"] .framing{margin-top:8px;padding:7px 10px}
  :root[data-density="compact"] .mrow{padding:7px 12px}

  /* ---------- trash list rows (6) ---------- */
  .trash-sub{font-size:11.5px;color:var(--ink-faint);margin:-4px 0 12px}
  .hist-item .hi-actions{display:flex;gap:6px}
  .hist-item .hi-actions .mini-btn{padding:7px 10px}

  /* ---------- finish-line celebration (31) ---------- */
  .toast{
    position:fixed;left:50%;transform:translateX(-50%) translateY(20px);
    bottom:calc(96px + env(safe-area-inset-bottom));
    z-index:70;opacity:0;pointer-events:none;
    background:var(--new);color:#08120c;
    font-size:13.5px;font-weight:700;
    padding:11px 18px;border-radius:999px;
    box-shadow:0 6px 22px rgba(0,0,0,.3);
    transition:opacity .3s,transform .3s;white-space:nowrap;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .confetti-wrap{position:fixed;inset:0;z-index:65;pointer-events:none;overflow:hidden}
  .confetti{
    position:absolute;top:-14px;width:9px;height:14px;border-radius:2px;
    animation:conffall linear forwards;
  }
  @keyframes conffall{
    0%{transform:translateY(0) rotate(0);opacity:1}
    100%{transform:translateY(108vh) rotate(720deg);opacity:.9}
  }

  /* ========================================================
     NOTEBOOK SKIN (v2.2) — "midnight field notebook"
     Re-paint only: colors, fonts, borders, textures. Every
     size, padding and layout stays exactly as the classic
     skin. Always dark — ignores the phone light setting.
     ======================================================== */
  :root[data-skin="nb"],
  :root[data-skin="nb"][data-theme="light"]{
    --bg:#0b0c0f;
    --panel:#16181d;
    --panel-2:#1b1e24;
    --line:#313845;
    --ink:#d7dde6;
    --ink-dim:#9aa5b3;
    --ink-faint:#7a8494;
    --accent:#22d3ee;
    --accent-soft:rgba(34,211,238,.14);
    --new:#5eead4;
    --new-soft:rgba(94,234,212,.13);
    --same:#c4b5fd;
    --same-soft:rgba(196,181,253,.14);
    --nb-hand:'Patrick Hand',var(--sans);
    --nb-title:'Caveat',cursive;
    --nb-mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  }
  /* graph-paper backdrop */
  :root[data-skin="nb"] body{
    background-color:var(--bg);
    background-image:
      linear-gradient(rgba(34,211,238,.045) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,.045) 1px, transparent 1px),
      linear-gradient(rgba(34,211,238,.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,.02) 1px, transparent 1px);
    background-size:96px 96px, 96px 96px, 24px 24px, 24px 24px;
    font-family:var(--nb-hand);
  }
  :root[data-skin="nb"] .brand h1{
    font-family:var(--nb-title);
    font-weight:700;
    letter-spacing:.4px;
    /* hand-drawn scribble underline */
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 12'><path d='M2 6 Q 15 1, 30 6 T 60 6 T 90 6 T 120 6 T 150 6 T 180 6 T 198 6' fill='none' stroke='%2322d3ee' stroke-width='2' stroke-linecap='round'/></svg>");
    background-repeat:no-repeat;
    background-position:0 100%;
    background-size:100% 6px;
    padding-bottom:5px;
  }
  :root[data-skin="nb"] .brand .dot{
    background:var(--accent);
    box-shadow:0 0 12px rgba(34,211,238,.55);
  }
  :root[data-skin="nb"] .mono,
  :root[data-skin="nb"] textarea,
  :root[data-skin="nb"] .desc-box,
  :root[data-skin="nb"] .cut-no,
  :root[data-skin="nb"] .was,
  :root[data-skin="nb"] .cut-meta,
  :root[data-skin="nb"] .tile b,
  :root[data-skin="nb"] .ord{
    font-family:var(--nb-mono);
  }
  /* notebook-page panels: dashed hand-cut edges, uneven corners */
  :root[data-skin="nb"] .inputs,
  :root[data-skin="nb"] .dash,
  :root[data-skin="nb"] .modal,
  :root[data-skin="nb"] .scene-index{
    border:1.5px dashed #39404b;
    border-radius:6px 18px 18px 6px;
    box-shadow:0 30px 60px -20px rgba(0,0,0,.8), inset 0 0 90px rgba(0,0,0,.3);
  }
  :root[data-skin="nb"] .card{
    border:1.5px dashed #39404b;
    border-radius:8px 14px 8px 14px;
    box-shadow:0 14px 34px -16px rgba(0,0,0,.7);
  }
  /* sticky-note tilt — straightens when touched */
  :root[data-skin="nb"] .card:nth-child(odd){ transform:rotate(-0.3deg); }
  :root[data-skin="nb"] .card:nth-child(even){ transform:rotate(0.25deg); }
  :root[data-skin="nb"] .card:hover,
  :root[data-skin="nb"] .card:active{ transform:rotate(0); border-color:#5eead4; }
  :root[data-skin="nb"] .card.flagged{ border-color:var(--accent); border-style:dashed; }
  /* small buttons keep their ORIGINAL shapes (solid border, even/round
     corners) — only the notebook cyan palette + mono font carry over.
     No border-radius here, so the classic radii apply unchanged. */
  :root[data-skin="nb"] .mini-btn,
  :root[data-skin="nb"] .chip,
  :root[data-skin="nb"] .toggle-chip,
  :root[data-skin="nb"] .btn-copy,
  :root[data-skin="nb"] .btn-print{
    background:#20242c;
    border:1px solid var(--line);
    font-family:var(--nb-mono);
  }
  :root[data-skin="nb"] .mini-btn:hover,
  :root[data-skin="nb"] .chip:hover,
  :root[data-skin="nb"] .toggle-chip:hover,
  :root[data-skin="nb"] .btn-copy:hover{ border-color:#5eead4; }
  :root[data-skin="nb"] .chip.on,
  :root[data-skin="nb"] .toggle-chip.on{
    background:rgba(34,211,238,.14);

  :root[data-skin="nb"] .btn-clear{ border:1px solid var(--line); }
  :root[data-skin="nb"] .btn-copynext,
  :root[data-skin="nb"] .bottombar .bb-next{

  }
  :root[data-skin="nb"] .btn-copynext:disabled,
  :root[data-skin="nb"] .bottombar .bb-next:disabled{
    background:var(--panel-2); color:var(--ink-faint); box-shadow:none;
  }
  /* striped, animated progress fills */
  :root[data-skin="nb"] .progress-bar,
  :root[data-skin="nb"] .bottombar .bb-mini{ border:1px dashed #3a4250; background:#0b0e13; }
  :root[data-skin="nb"] .progress-bar i,
  :root[data-skin="nb"] .bottombar .bb-mini i,
  :root[data-skin="nb"] .ratio .r-new{
    background:repeating-linear-gradient(45deg,#22d3ee 0 12px,#0891b2 12px 24px);
    background-size:200% 100%;
    animation:nbStripe 1.5s linear infinite;
    box-shadow:0 0 14px rgba(34,211,238,.45);
  }
  :root[data-skin="nb"] .ratio .r-same{ background:var(--same); }
  @keyframes nbStripe{ to{ background-position:-48px 0; } }
  :root[data-skin="nb"] .progress-top b{ color:var(--accent); }
  /* inputs, dropdown feel */
  :root[data-skin="nb"] textarea,
  :root[data-skin="nb"] .projects select,
  :root[data-skin="nb"] .presets select{
    background:#20242c;
    border:1.5px dashed #3a4250;
  }
  :root[data-skin="nb"] textarea:focus,
  :root[data-skin="nb"] .projects select:focus,
  :root[data-skin="nb"] .presets select:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px rgba(34,211,238,.14);
  }
  /* badges: dashed ink stamps */
  :root[data-skin="nb"] .badge{ border:1px dashed currentColor; }
  :root[data-skin="nb"] .framing{
    border:1.5px dashed rgba(34,211,238,.4);
    background:rgba(34,211,238,.08);
    color:var(--accent);
    font-family:var(--nb-hand);
  }
  :root[data-skin="nb"] .vo-line{ font-family:var(--nb-hand); }
  :root[data-skin="nb"] .connector{
    background:repeating-linear-gradient(to bottom, var(--same) 0 6px, transparent 6px 12px);
    background-size:100% 24px;
  }
  /* dashboard, resume, cost rows */
  :root[data-skin="nb"] .dash summary,
  :root[data-skin="nb"] .dash-h,
  :root[data-skin="nb"] .modal-head h3{ font-family:var(--nb-mono); }
  :root[data-skin="nb"] .cost-row{ border:1.5px dashed rgba(34,211,238,.35); background:rgba(34,211,238,.07); }
  :root[data-skin="nb"] .resume-bar{
    background:rgba(34,211,238,.08);
    border:1.5px dashed var(--accent);
  }
  :root[data-skin="nb"] .resume-bar .rb-go{ background:var(--accent); color:#06171b; }
  :root[data-skin="nb"] .compare{ background:var(--same-soft); }
  :root[data-skin="nb"] .empty{ border:2px dashed #3f4856; border-radius:10px 22px 10px 22px; font-family:var(--nb-hand); }
  /* bottom bar, fab, toast, modal sheet */
  :root[data-skin="nb"] .bottombar{ border-top:1.5px dashed #39404b; }
  :root[data-skin="nb"] .fab,
  :root[data-skin="nb"] .bottombar .bb-top{ border:1px solid var(--line); background:#20242c; }
  :root[data-skin="nb"] .toast{
    background:var(--accent); color:#06171b;
    box-shadow:0 6px 22px rgba(34,211,238,.4);
  }
  :root[data-skin="nb"] .merged-head,
  :root[data-skin="nb"] .mrow .mno{ font-family:var(--nb-mono); }
  :root[data-skin="nb"] .mrow .mtext{ font-family:var(--nb-hand); }
  :root[data-skin="nb"] .mrow .mcopy{ border:1px dashed var(--line); }
  :root[data-skin="nb"] .hist-item{ border:1.5px dashed #39404b; border-radius:8px 14px 8px 14px; }
  :root[data-skin="nb"] ::-webkit-scrollbar-thumb{ background:#2a303a; }
  /* keep the tilt out of reduced-motion contexts */
  @media (prefers-reduced-motion:reduce){
    :root[data-skin="nb"] .card:nth-child(odd),
    :root[data-skin="nb"] .card:nth-child(even){ transform:none; }
  }

  /* ---------- print / PDF shot list ---------- */
  @media print{
    :root,
    :root[data-skin="nb"],
    :root[data-theme="light"],
    :root[data-theme="dark"]{
      --bg:#ffffff;
      --panel:#ffffff;
      --panel-2:#ffffff;
      --line:#b9bec8;
      --ink:#000000;
      --ink-dim:#333333;
      --ink-faint:#555555;

    }
    body{padding:0;font-size:12px;background:#fff!important;background-image:none!important;font-family:var(--sans)!important}
    .card{transform:none!important;border-style:solid!important}
    .brand h1{background-image:none!important;font-family:var(--sans)!important}
    .head-btns,
    .inputs,
    .projects,
    .toolbar,
    .scene-index,
    .compare,
    .fab,
    .card-tools,
    .btn-copy,
    .connector,
    .empty,
    .dash-actions,
    .footer,
    .bottombar,
    .resume-bar,
    .toggle-chip,
    .mrow .mcopy,
    .toast,
    .confetti-wrap,
    .theme-toggle{display:none!important}
    .card.collapsed .card-body,
    .card.collapsed .vo-line{display:block!important}
    .card.flagged{border-color:#b9bec8}
    .brand .dot{box-shadow:none}
    .status{margin-top:6px}
    .card{
      break-inside:avoid;page-break-inside:avoid;
      box-shadow:none;animation:none;
      margin-bottom:10px;
      opacity:1!important;

  }
</style>
