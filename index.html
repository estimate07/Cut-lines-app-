<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scene Cut Splitter</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1d212b;
    --line:#2a2f3c;
    --ink:#e8eaf0;
    --ink-dim:#9aa1b2;
    --ink-faint:#6b7280;
    --accent:#f59a3c;
    --accent-soft:rgba(245,154,60,.14);
    --new:#4cc38a;
    --new-soft:rgba(76,195,138,.13);
    --same:#6ea8fe;
    --same-soft:rgba(110,168,254,.13);
    --radius:16px;
    --radius-sm:10px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  /* ---------- light theme palette ---------- */
  :root[data-theme="light"]{
    --bg:#f4f6f9;
    --panel:#ffffff;
    --panel-2:#eceff4;
    --line:#dce0e8;
    --ink:#1a1d24;
    --ink-dim:#57607a;
    --ink-faint:#8891a6;
    --accent-soft:rgba(245,154,60,.16);
    --new:#279a63;
    --new-soft:rgba(39,154,99,.14);
    --same:#3072d6;
    --same-soft:rgba(48,114,214,.14);
  }
  :root[data-theme="light"] .card:hover{border-color:#c3c9d6}
  :root[data-theme="light"] ::-webkit-scrollbar-thumb{background:#c8cdd8}
  /* auto: follow phone setting when no manual choice */
  @media (prefers-color-scheme:light){
    :root:not([data-theme="dark"]){
      --bg:#f4f6f9;
      --panel:#ffffff;
      --panel-2:#eceff4;
      --line:#dce0e8;
      --ink:#1a1d24;
      --ink-dim:#57607a;
      --ink-faint:#8891a6;
      --accent-soft:rgba(245,154,60,.16);
      --new:#279a63;
      --new-soft:rgba(39,154,99,.14);
      --same:#3072d6;
      --same-soft:rgba(48,114,214,.14);
    }
    :root:not([data-theme="dark"]) .card:hover{border-color:#c3c9d6}
    :root:not([data-theme="dark"]) ::-webkit-scrollbar-thumb{background:#c8cdd8}
  }
  /* ---------- colorblind-safe palette (Okabe-Ito) ---------- */
  :root[data-cb="1"]{
    --new:#009e73;
    --new-soft:rgba(0,158,115,.15);
    --same:#cc79a7;
    --same-soft:rgba(204,121,167,.16);
  }
  :root[data-cb="1"] .badge.new::before{content:"\25C6\00a0"}
  :root[data-cb="1"] .badge.same::before{content:"\25CF\00a0"}
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.55;
    min-height:100vh;
    padding:22px 16px calc(60px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:820px;margin:0 auto}

  /* ---------- header ---------- */
  header{margin-bottom:22px}
  .brand{
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .brand h1{
    font-size:20px;font-weight:700;letter-spacing:.2px;
  }
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--accent);
    align-self:center;
    box-shadow:0 0 12px rgba(245,154,60,.55);
  }
  .brand small{color:var(--ink-faint);font-size:12.5px;font-weight:500}
  .head-btns{margin-left:auto;align-self:center;display:flex;gap:8px}
  .icon-btn{
    appearance:none;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:999px;
    background:var(--panel);border:1px solid var(--line);
    color:var(--ink-dim);
    transition:color .18s,border-color .18s,transform .12s;
    -webkit-tap-highlight-color:transparent;
  }
  .icon-btn:hover{color:var(--ink);border-color:var(--ink-faint)}
  .icon-btn:active{transform:scale(.94)}
  .icon-btn svg{width:17px;height:17px}
  .icon-btn.on{color:var(--accent);border-color:var(--accent)}
  .brand{width:100%}

  /* ---------- input panel ---------- */
  .inputs{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    display:flex;flex-direction:column;gap:14px;
  }
  .field label{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;
    letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:7px;
  }
  .field label .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:18px;height:18px;border-radius:6px;
    background:var(--accent-soft);color:var(--accent);
    font-size:11px;font-weight:700;
  }
  .field label .hint{
    margin-left:auto;font-size:10px;font-weight:500;
    letter-spacing:.3px;text-transform:none;color:var(--ink-faint);
  }
  textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12.5px;
    line-height:1.5;
    padding:11px 12px;
    resize:vertical;
    outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  textarea::placeholder{color:var(--ink-faint)}
  textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  #resultInput{min-height:120px;max-height:220px}
  #promptInput{min-height:72px;max-height:150px}

  .actions{display:flex;gap:10px;align-items:center}
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:600;
    border-radius:var(--radius-sm);
    transition:transform .12s, background .18s, color .18s, box-shadow .18s, border-color .18s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97)}
  .btn-generate{
    flex:1;
    background:var(--accent);
    color:#141005;
    font-size:14.5px;
    padding:12px 18px;
    box-shadow:0 4px 18px rgba(245,154,60,.28);
  }
  .btn-generate:hover{background:#ffab53}
  .btn-clear{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:13px;
    padding:11px 16px;
  }
  .btn-clear:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-clear.undo{color:var(--accent);border-color:var(--accent)}

  /* ---------- status strip ---------- */
  .status{
    display:none;
    margin:18px 2px 4px;
    font-size:12.5px;font-weight:600;
    letter-spacing:.4px;
    color:var(--ink-dim);
  }
  .status.show{display:flex;gap:14px;flex-wrap:wrap}
  .status b{color:var(--ink)}
  .status .pill-new{color:var(--new)}
  .status .pill-same{color:var(--same)}
  .status .pill-merge{color:var(--accent)}
  .status .err{color:#ff7d7d}

  /* ---------- session dashboard ---------- */
  .dash{
    display:none;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    margin-top:14px;
    overflow:hidden;
  }
  .dash.show{display:block}
  .dash summary{
    cursor:pointer;list-style:none;
    display:flex;align-items:center;gap:8px;
    padding:13px 14px;
    font-size:12px;font-weight:700;
    letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-dim);
    -webkit-tap-highlight-color:transparent;
  }
  .dash summary::-webkit-details-marker{display:none}
  .dash summary .chev{margin-left:auto;transition:transform .2s;font-size:11px}
  .dash[open] summary .chev{transform:rotate(180deg)}
  .dash-body{padding:2px 14px 14px;display:flex;flex-direction:column;gap:14px}
  .dash-h{
    font-size:10.5px;font-weight:700;letter-spacing:.7px;
    text-transform:uppercase;color:var(--ink-faint);
    margin-bottom:6px;
  }
  .ratio{display:flex;height:10px;border-radius:999px;overflow:hidden;background:var(--panel-2)}
  .ratio i{display:block;height:100%}
  .ratio .r-new{background:var(--new)}
  .ratio .r-same{background:var(--same)}
  .ratio-legend{
    display:flex;gap:16px;flex-wrap:wrap;
    font-size:11.5px;font-weight:600;color:var(--ink-dim);
    margin-top:7px;
  }
  .ratio-legend .sw{
    display:inline-block;width:8px;height:8px;border-radius:2px;
    margin-right:5px;
  }
  .ratio-legend .sw.n{background:var(--new)}
  .ratio-legend .sw.s{background:var(--same)}
  .tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:10px}
  .tile{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:10px 12px;
  }
  .tile b{display:block;font-size:17px;font-family:var(--mono);color:var(--ink);line-height:1.3}
  .tile span{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-faint)}
  .cost-row{
    display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    font-size:12.5px;color:var(--ink-dim);
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .cost-row input{
    width:80px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--ink);
    font-family:var(--mono);
    font-size:12px;
    padding:5px 8px;
    outline:none;
  }
  .cost-row input:focus{border-color:var(--accent)}
  .cost-row b{color:var(--ink);font-family:var(--mono);font-size:13.5px}
  .cost-row #imgsOut{font-family:var(--mono);font-size:11.5px;color:var(--ink-faint)}
  .cost-row input#imgsInput{width:56px}
  .dist{display:flex;flex-direction:column;gap:6px}
  .dist-row{
    display:grid;grid-template-columns:66px 1fr 64px;
    align-items:center;gap:8px;
    font-size:11.5px;color:var(--ink-dim);
  }
  .dist-row .lbl{font-family:var(--mono);white-space:nowrap}
  .dist-row .bar{height:8px;border-radius:999px;background:var(--panel-2);overflow:hidden}
  .dist-row .bar i{display:block;height:100%;background:var(--accent);border-radius:999px}
  .dist-row .val{text-align:right;font-family:var(--mono);white-space:nowrap}
  .dash-actions{display:flex;justify-content:flex-end}
  .btn-print{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:12px;font-weight:600;
    padding:8px 14px;
    border-radius:999px;
  }
  .btn-print:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-print svg{width:13px;height:13px}

  /* ---------- cut cards ---------- */
  #cards{display:flex;flex-direction:column;gap:0;margin-top:14px}
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:14px;
    animation:rise .35s cubic-bezier(.2,.7,.3,1) both;
    transition:border-color .2s, opacity .25s;
  }
  .card.linked{margin-bottom:0}
  .card:hover{border-color:#3a4152}
  .card.done{opacity:.55}
  .card.done:hover{opacity:.85}
  .card.done .cut-no::after{content:" \2713";color:var(--new)}
  @keyframes rise{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:none}
  }
  .card-head{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .cut-no{
    font-family:var(--mono);
    font-size:14px;font-weight:700;
    color:var(--ink);
    white-space:nowrap;
  }
  .was{
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--ink-faint);
    white-space:nowrap;
  }
  .badge{
    font-size:10.5px;font-weight:700;
    letter-spacing:.7px;
    padding:4px 9px;border-radius:999px;
    white-space:nowrap;
  }
  .badge.new{background:var(--new-soft);color:var(--new)}
  .badge.same{background:var(--same-soft);color:var(--same)}
  .card-head .btn-copy{margin-left:auto}
  .btn-copy{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:12px;font-weight:600;
    padding:7px 13px;
    border-radius:999px;
  }
  .btn-copy:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-copy.copied{
    background:var(--new-soft);
    border-color:transparent;
    color:var(--new);
  }
  .btn-copy svg{width:13px;height:13px;flex:none}

  .vo-line{
    padding:10px 14px 0;
    font-size:12.5px;
    line-height:1.5;
    color:var(--ink-dim);
    font-style:italic;
  }
  .vo-line b{color:var(--ink);font-style:normal;font-weight:600}

  .card-body{padding:14px}
  .desc-box{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:12px 13px;
    max-height:300px;
    overflow-y:auto;
    font-family:var(--mono);
    font-size:12px;
    line-height:1.6;
    color:var(--ink-dim);
    white-space:pre-wrap;
    word-break:break-word;
    -webkit-overflow-scrolling:touch;
  }
  .desc-box .style-part{color:var(--ink-faint)}
  .desc-box .divider{
    display:block;
    border:none;border-top:1px dashed var(--line);
    margin:10px 0;
  }
  .desc-box .scene-part{color:var(--ink)}

  .cut-meta{
    display:flex;gap:12px;flex-wrap:wrap;
    margin-top:9px;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--ink-faint);
  }

  .framing{
    display:flex;align-items:center;gap:8px;
    margin-top:11px;
    font-size:12.5px;font-weight:600;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .framing span{color:var(--ink);font-weight:500}

  /* ---------- animated connector ---------- */
  .connector{
    width:3px;height:34px;
    margin:0 auto;
    border-radius:3px;
    background:repeating-linear-gradient(
      to bottom,
      var(--same) 0 6px,
      transparent 6px 12px
    );
    background-size:100% 24px;
    animation:flow 1.1s linear infinite;
    opacity:.85;
  }
  @keyframes flow{
    from{background-position:0 0}
    to{background-position:0 24px}
  }

  .empty{
    display:none;
    text-align:center;
    color:var(--ink-faint);
    font-size:13.5px;
    padding:46px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    margin-top:16px;
  }
  .empty.show{display:block}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2e3442;border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  @media (max-width:520px){
    body{padding:16px 10px calc(48px + env(safe-area-inset-bottom))}
    .inputs{padding:13px}
    .card-head{padding:10px 12px}
    .card-body{padding:12px}
  }

  /* ---------- print / PDF shot list ---------- */
  @media print{
    :root,
    :root[data-theme="light"],
    :root[data-theme="dark"]{
      --bg:#ffffff;
      --panel:#ffffff;
      --panel-2:#ffffff;
      --line:#b9bec8;
      --ink:#000000;
      --ink-dim:#333333;
      --ink-faint:#555555;
      --accent-soft:transparent;
    }
    body{padding:0;font-size:12px;background:#fff}
    .head-btns,
    .inputs,
    .btn-copy,
    .connector,
    .empty,
    .dash-actions,
    .theme-toggle{display:none!important}
    .brand .dot{box-shadow:none}
    .status{margin-top:6px}
    .card{
      break-inside:avoid;page-break-inside:avoid;
      box-shadow:none;animation:none;
      margin-bottom:10px;
      opacity:1!important;
    }
    .card.linked{margin-bottom:10px}
    .desc-box{max-height:none;overflow:visible}
    .dash{break-inside:avoid;page-break-inside:avoid}
    .dash summary .chev{display:none}
    .btn-generate,.btn-clear{display:none!important}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>Scene Cut Splitter</h1>
      <small>offline &middot; paste &rarr; generate &rarr; copy</small>
      <div class="head-btns">
        <button class="icon-btn" id="cbToggle" type="button" aria-label="Toggle colorblind-safe colors" title="Colorblind-safe colors"></button>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <section class="inputs">
    <div class="field">
      <label><span class="num">1</span> Full result -- Step 1 output <span class="hint">multi-part paste OK &mdash; auto renumbered</span></label>
      <textarea id="resultInput" placeholder="Paste the full part output here (all 🦕 cut blocks)… You can paste several parts back-to-back." spellcheck="false"></textarea>
    </div>
    <div class="field">
      <label><span class="num">2</span> Text to image prompt</label>
      <textarea id="promptInput" placeholder="Paste the text-to-image style prompt here…" spellcheck="false"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-generate" id="generateBtn">Generate</button>
      <button class="btn btn-clear" id="clearBtn">Clear</button>
    </div>
  </section>

  <div class="status" id="status"></div>

  <details class="dash" id="dash" open>
    <summary>Session dashboard <span class="chev">&#9662;</span></summary>
    <div class="dash-body" id="dashBody"></div>
  </details>

  <div id="cards"></div>
  <div class="empty" id="empty">No cuts found. Check that the pasted result contains 🦕 cut blocks.</div>

</div>

<script>
(function(){
  var resultInput = document.getElementById('resultInput');
  var promptInput = document.getElementById('promptInput');
  var generateBtn = document.getElementById('generateBtn');
  var clearBtn    = document.getElementById('clearBtn');
  var cardsEl     = document.getElementById('cards');
  var statusEl    = document.getElementById('status');
  var emptyEl     = document.getElementById('empty');
  var dashEl      = document.getElementById('dash');
  var dashBody    = document.getElementById('dashBody');

  var BASE_TITLE   = 'Scene Cut Splitter';
  var DEFAULT_RATE = 0.039; /* Nano Banana 2 (Google Flow) — editable, $/image */
  var DEFAULT_IMGS = 4;     /* images generated per cut, pick 1 — editable */

  var COPY_ICON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var PRINT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>';

  /* ---------- tiny localStorage helpers (never throw) ---------- */
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

  /* ---------- parsing ---------- */
  function parseCuts(text){
    var cuts = [];
    var lines = text.split(/\r?\n/);
    var i = 0;
    while(i < lines.length){
      var line = lines[i];
      var m = line.match(/🦕\s*(\d+)\s*(.*)/);
      if(m){
        var cut = { num: m[1], origNum: null, vo: (m[2]||'').trim(), token:'', scene:'', framing:'' };
        var j = i + 1;
        while(j < lines.length){
          var l = lines[j];
          if(/🦕\s*\d+/.test(l) || /▶/.test(l) || /AWAITING NEXT PART/.test(l) || /^COMPLETE/.test(l)) break;
          var sm = l.match(/\[(NEW SCENE|SAME SCENE)\]/);
          if(sm && !cut.scene){
            cut.token = sm[1];
            var after = l.slice(l.indexOf('[' + sm[1] + ']') + sm[1].length + 2);
            cut.scene = after.replace(/^\s*↳?\s*/,'').trim();
          } else if(/📷/.test(l)){
            cut.framing = l.replace(/.*📷\s*/,'').replace(/^framing\s*:?\s*/i,'').trim();
          } else if(cut.scene && !cut.framing && l.trim() && !/^[L↳\s]*$/.test(l)){
            if(!/📷/.test(l)) cut.scene += ' ' + l.replace(/^\s*↳?\s*/,'').trim();
          }
          j++;
        }
        if(cut.scene || cut.framing) cuts.push(cut);
        i = j;
      } else {
        i++;
      }
    }
    return cuts;
  }

  /* Multi-part merge: detect numbering restarts (a new pasted part
     starting over at 1) and renumber everything into one sequence. */
  function mergeParts(cuts){
    var restarts = 0;
    for(var i = 1; i < cuts.length; i++){
      if(parseInt(cuts[i].num,10) <= parseInt(cuts[i-1].num,10)) restarts++;
    }
    if(restarts > 0){
      cuts.forEach(function(c, k){
        c.origNum = c.num;
        c.num = String(k + 1);
      });
    }
    return restarts + 1; /* number of parts detected */
  }

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function words(s){
    s = (s||'').trim();
    return s ? s.split(/\s+/).length : 0;
  }

  function fmtTime(totalSec){
    var m = Math.floor(totalSec / 60);
    var s = Math.round(totalSec % 60);
    if(s === 60){ m++; s = 0; }
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  /* ---------- session dashboard ---------- */
  function renderDashboard(cuts, newCount, sameCount, parts){
    var total = cuts.length;
    var voWordsTotal = 0, descWordsTotal = 0;
    cuts.forEach(function(c){
      voWordsTotal   += words(c.vo);
      descWordsTotal += words(c.scene);
    });

    /* Estimated runtime: VO words at ~150 wpm (2.5 words/sec) */
    var runtimeSec = voWordsTotal / 2.5;

    /* Scene runs: each NEW SCENE starts a run; SAME SCENE extends it */
    var runs = [];
    cuts.forEach(function(c){
      if(c.token === 'SAME SCENE' && runs.length){ runs[runs.length - 1]++; }
      else { runs.push(1); }
    });
    var maxRun = runs.reduce(function(a,b){ return Math.max(a,b); }, 1);

    var avgWords = total ? Math.round(descWordsTotal / total) : 0;
    var pctNew = total ? (newCount / total * 100) : 0;

    var savedRate = parseFloat(lsGet('scs_rate'));
    var rate = (isFinite(savedRate) && savedRate >= 0) ? savedRate : DEFAULT_RATE;
    var savedImgs = parseInt(lsGet('scs_imgs'), 10);
    var imgs = (isFinite(savedImgs) && savedImgs >= 1) ? savedImgs : DEFAULT_IMGS;

    var html = '';

    /* #1 scene breakdown bar */
    html += '<div><div class="dash-h">Scene breakdown</div>' +
      '<div class="ratio">' +
        '<i class="r-new" style="width:' + pctNew.toFixed(1) + '%"></i>' +
        '<i class="r-same" style="width:' + (100 - pctNew).toFixed(1) + '%"></i>' +
      '</div>' +
      '<div class="ratio-legend">' +
        '<span><span class="sw n"></span>' + newCount + ' NEW SCENE</span>' +
        '<span><span class="sw s"></span>' + sameCount + ' SAME SCENE</span>' +
        (parts > 1 ? '<span>' + parts + ' parts merged</span>' : '') +
      '</div></div>';

    /* stat tiles: cuts, scenes, est runtime (#2), avg words */
    html += '<div class="tiles">' +
      '<div class="tile"><b>' + total + '</b><span>Cuts</span></div>' +
      '<div class="tile"><b>' + runs.length + '</b><span>Scenes</span></div>' +
      '<div class="tile"><b>~' + fmtTime(runtimeSec) + '</b><span>Est. runtime</span></div>' +
      '<div class="tile"><b>' + avgWords + '</b><span>Avg words/cut</span></div>' +
    '</div>';

    /* #7 cost estimate — Nano Banana 2 via Google Flow, editable rate + images/cut */
    html += '<div class="cost-row">🍌 Nano Banana 2 (Google Flow) &mdash; ' +
      '<label for="rateInput">$/image</label> ' +
      '<input id="rateInput" type="number" min="0" step="0.001" inputmode="decimal" value="' + rate + '"> ' +
      '&times; ' +
      '<label for="imgsInput">imgs/cut</label> ' +
      '<input id="imgsInput" type="number" min="1" step="1" inputmode="numeric" value="' + imgs + '"> ' +
      '&times; ' + total + ' cuts = <b id="costOut"></b>' +
      '<span id="imgsOut"></span></div>';

    /* #4 scene-length distribution */
    html += '<div><div class="dash-h">Scene length (cuts per scene)</div><div class="dist">';
    runs.forEach(function(len, i){
      var w = Math.max(4, len / maxRun * 100);
      html += '<div class="dist-row">' +
        '<span class="lbl">Scene ' + (i + 1) + '</span>' +
        '<span class="bar"><i style="width:' + w.toFixed(1) + '%"></i></span>' +
        '<span class="val">' + len + ' cut' + (len > 1 ? 's' : '') + '</span>' +
      '</div>';
    });
    html += '</div></div>';

    /* #16 print / PDF */
    html += '<div class="dash-actions"><button class="btn btn-print" id="printBtn" type="button">' +
      PRINT_ICON + '<span>Print / PDF</span></button></div>';

    dashBody.innerHTML = html;
    dashEl.classList.add('show');

    var rateInput = document.getElementById('rateInput');
    var imgsInput = document.getElementById('imgsInput');
    var costOut   = document.getElementById('costOut');
    var imgsOut   = document.getElementById('imgsOut');
    function updateCost(){
      var r = parseFloat(rateInput.value);
      if(!isFinite(r) || r < 0) r = 0;
      var n = parseInt(imgsInput.value, 10);
      if(!isFinite(n) || n < 1) n = 1;
      var totalImgs = n * total;
      costOut.textContent = '$' + (r * totalImgs).toFixed(2);
      imgsOut.textContent = ' (' + totalImgs + ' imgs)';
      lsSet('scs_rate', String(r));
      lsSet('scs_imgs', String(n));
    }
    rateInput.addEventListener('input', updateCost);
    imgsInput.addEventListener('input', updateCost);
    updateCost();

    document.getElementById('printBtn').addEventListener('click', function(){
      window.print();
    });
  }

  /* ---------- render ---------- */
  function render(){
    var raw = resultInput.value || '';
    var stylePrompt = (promptInput.value || '').trim();
    var cuts = parseCuts(raw);
    var parts = mergeParts(cuts);

    cardsEl.innerHTML = '';
    statusEl.innerHTML = '';
    statusEl.classList.remove('show');
    emptyEl.classList.remove('show');
    dashEl.classList.remove('show');
    dashBody.innerHTML = '';
    document.title = BASE_TITLE;

    if(!raw.trim()){
      emptyEl.textContent = 'Paste the Step 1 result in box 1, then tap Generate.';
      emptyEl.classList.add('show');
      return;
    }
    if(cuts.length === 0){
      emptyEl.textContent = 'No cuts found. Check that the pasted result contains 🦕 cut blocks.';
      emptyEl.classList.add('show');
      return;
    }

    /* #14 cut count in tab title */
    document.title = cuts.length + ' cuts — ' + BASE_TITLE;

    var newCount = 0, sameCount = 0;
    var frag = document.createDocumentFragment();

    cuts.forEach(function(cut, idx){
      var isSame = cut.token === 'SAME SCENE';
      if(isSame) sameCount++; else newCount++;

      // Full description = scene description + framing line, counted together.
      var fullDesc = cut.scene + (cut.framing ? ' Camera framing: ' + cut.framing + '.' : '');

      // SAME SCENE cards never get the style prompt prepended.
      var fullCopy = (!isSame && stylePrompt ? stylePrompt + '\n\n' : '') + fullDesc;

      var card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = Math.min(idx * 35, 400) + 'ms';

      var badgeClass = isSame ? 'same' : 'new';
      var badgeText  = cut.token || 'NEW SCENE';

      var descHtml = '';
      if(!isSame && stylePrompt){
        descHtml += '<span class="style-part">' + esc(stylePrompt) + '</span><hr class="divider">';
      }
      descHtml += '<span class="scene-part">' + esc(fullDesc) + '</span>';

      /* #3 per-cut data counts */
      var dWords = words(fullDesc);
      var metaHtml = '<div class="cut-meta">' +
        '<span>' + dWords + ' words</span>' +
        '<span>' + fullDesc.length + ' chars</span>' +
        '<span>prompt ' + fullCopy.length + ' chars</span>' +
        (cut.vo ? '<span>line ' + words(cut.vo) + ' words</span>' : '') +
      '</div>';

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="cut-no">🦕 ' + esc(cut.num) + '</span>' +
          (cut.origNum ? '<span class="was">was ' + esc(cut.origNum) + '</span>' : '') +
          '<span class="badge ' + badgeClass + '">' + esc(badgeText) + '</span>' +
          '<button class="btn btn-copy">' + COPY_ICON + '<span>Copy</span></button>' +
        '</div>' +
        (cut.vo ? '<div class="vo-line"><b>Line:</b> ' + esc(cut.vo) + '</div>' : '') +
        '<div class="card-body">' +
          '<div class="desc-box">' + descHtml + '</div>' +
          metaHtml +
          (cut.framing ? '<div class="framing">📷 <span>' + esc(cut.framing) + '</span></div>' : '') +
        '</div>';

      var copyBtn = card.querySelector('.btn-copy');
      copyBtn.addEventListener('click', function(){
        copyText(fullCopy, copyBtn, card);
      });

      frag.appendChild(card);

      // Animated connector when the next cut is SAME SCENE.
      var next = cuts[idx + 1];
      if(next && next.token === 'SAME SCENE'){
        card.classList.add('linked');
        var conn = document.createElement('div');
        conn.className = 'connector';
        frag.appendChild(conn);
      }
    });

    cardsEl.appendChild(frag);

    statusEl.innerHTML =
      '<span><b>' + cuts.length + '</b> cuts</span>' +
      '<span class="pill-new"><b>' + newCount + '</b> NEW SCENE</span>' +
      '<span class="pill-same"><b>' + sameCount + '</b> SAME SCENE</span>' +
      (parts > 1 ? '<span class="pill-merge"><b>' + parts + '</b> parts merged &middot; renumbered</span>' : '');
    statusEl.classList.add('show');

    /* #10 session dashboard */
    renderDashboard(cuts, newCount, sameCount, parts);
  }

  /* ---------- copy (#5: mark copied cards) ---------- */
  function copyText(text, btn, card){
    function done(ok){
      if(!ok) return;
      btn.classList.add('copied');
      btn.innerHTML = CHECK_ICON + '<span>Copied</span>';
      if(card) card.classList.add('done');
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.innerHTML = COPY_ICON + '<span>Copy</span>';
      }, 1400);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){done(true);}, function(){fallbackCopy(text, done);});
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    var ok = false;
    try{ ok = document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    cb(ok);
  }

  /* ---------- theme toggle ---------- */
  var themeToggle = document.getElementById('themeToggle');
  var SUN  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>';
  var MOON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
  function currentTheme(){
    var t = document.documentElement.getAttribute('data-theme');
    if(t) return t;
    return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  }
  function paintToggle(){
    themeToggle.innerHTML = currentTheme() === 'light' ? MOON : SUN;
  }
  (function initTheme(){
    var saved = lsGet('theme');
    if(saved === 'light' || saved === 'dark'){
      document.documentElement.setAttribute('data-theme', saved);
    }
    paintToggle();
  })();
  themeToggle.addEventListener('click', function(){
    var next = currentTheme() === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    lsSet('theme', next);
    paintToggle();
  });

  /* ---------- #21 colorblind-safe toggle ---------- */
  var cbToggle = document.getElementById('cbToggle');
  var EYE = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>';
  cbToggle.innerHTML = EYE;
  function applyCb(on){
    if(on){
      document.documentElement.setAttribute('data-cb','1');
      cbToggle.classList.add('on');
    } else {
      document.documentElement.removeAttribute('data-cb');
      cbToggle.classList.remove('on');
    }
  }
  applyCb(lsGet('scs_cb') === '1');
  cbToggle.addEventListener('click', function(){
    var on = document.documentElement.getAttribute('data-cb') !== '1';
    applyCb(on);
    lsSet('scs_cb', on ? '1' : '0');
  });

  /* ---------- #8 remember last session ---------- */
  var saveTimer;
  function saveInputs(){
    lsSet('scs_result', resultInput.value);
    lsSet('scs_prompt', promptInput.value);
  }
  function queueSave(){
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveInputs, 400);
  }
  resultInput.addEventListener('input', queueSave);
  promptInput.addEventListener('input', queueSave);

  (function restoreSession(){
    var r = lsGet('scs_result');
    var p = lsGet('scs_prompt');
    if(r !== null) resultInput.value = r;
    if(p !== null) promptInput.value = p;
    if((r || '').trim()) render();
  })();

  /* ---------- #24 undo after clear ---------- */
  var clearedSnapshot = null;
  var undoTimer = null;
  function exitUndoMode(){
    clearTimeout(undoTimer);
    undoTimer = null;
    clearedSnapshot = null;
    clearBtn.classList.remove('undo');
    clearBtn.textContent = 'Clear';
  }
  clearBtn.addEventListener('click', function(){
    if(clearedSnapshot){
      /* restore */
      resultInput.value = clearedSnapshot.r;
      promptInput.value = clearedSnapshot.p;
      exitUndoMode();
      saveInputs();
      render();
      return;
    }
    if(!resultInput.value && !promptInput.value) return;
    clearedSnapshot = { r: resultInput.value, p: promptInput.value };
    resultInput.value = '';
    promptInput.value = '';
    cardsEl.innerHTML = '';
    statusEl.classList.remove('show');
    emptyEl.classList.remove('show');
    dashEl.classList.remove('show');
    dashBody.innerHTML = '';
    document.title = BASE_TITLE;
    saveInputs();
    resultInput.focus();
    clearBtn.classList.add('undo');
    clearBtn.textContent = 'Undo';
    undoTimer = setTimeout(exitUndoMode, 8000);
  });

  /* make sure the dashboard is expanded in the printed shot list */
  window.addEventListener('beforeprint', function(){
    dashEl.open = true;
  });

  generateBtn.addEventListener('click', render);
})();
</script>
</body>
</html>
