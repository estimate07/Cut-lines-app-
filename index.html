<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>Scene Cut Splitter</h1>
      <small>offline &middot; paste &rarr; generate &rarr; copy</small>
      <div class="head-btns">
        <button class="icon-btn" id="skinToggle" type="button" aria-label="Toggle notebook skin" title="Notebook skin">📓</button>
        <button class="icon-btn" id="setBtn" type="button" aria-label="Display settings" title="Text size & density"></button>
        <button class="icon-btn" id="cbToggle" type="button" aria-label="Toggle colorblind-safe colors" title="Colorblind-safe colors"></button>
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <!-- #29 projects bar -->
  <div class="projects" id="projects">
    <select id="projectSel" aria-label="Current project"></select>
    <button class="mini-btn" id="newProjBtn" type="button" title="New project">+ New</button>
    <button class="mini-btn" id="renameProjBtn" type="button" title="Rename project">Rename</button>
    <button class="mini-btn danger" id="delProjBtn" type="button" title="Delete project">Delete</button>
    <button class="mini-btn" id="histBtn" type="button" title="Recent sessions">Recent</button>
    <button class="mini-btn" id="trashBtn" type="button" title="Deleted projects">Trash</button>
  </div>

  <section class="inputs">
    <div class="field">
      <label><span class="num">1</span> Full result <span class="hint">multi-part OK</span>
        <button class="paste-btn" id="pasteResult" type="button" title="Paste from clipboard">Paste</button>
      </label>
      <textarea id="resultInput" placeholder="Paste the full part output here (all 🦕 cut blocks)… You can paste several parts back-to-back." spellcheck="false"></textarea>
    </div>
    <div class="field">
      <label><span class="num">2</span> Text to image prompt
        <button class="paste-btn" id="pastePrompt" type="button" title="Paste from clipboard">Paste</button>
      </label>
      <textarea id="promptInput" placeholder="Paste the text-to-image style prompt here…" spellcheck="false"></textarea>
      <!-- #36 style presets -->
      <div class="presets">
        <select id="presetSel" aria-label="Style presets"><option value="">Style presets…</option></select>
        <button class="mini-btn" id="savePresetBtn" type="button">Save</button>
        <button class="mini-btn danger" id="delPresetBtn" type="button">Del</button>
      </div>
    </div>
    <div class="actions">
      <button class="btn btn-generate" id="generateBtn">Generate</button>
      <button class="btn btn-clear" id="clearBtn">Clear</button>
    </div>
  </section>

  <div class="status" id="status"></div>

  <!-- #44 session compare -->
  <div class="compare" id="compare"></div>

  <!-- #2 #4 #12 #14 cards toolbar -->
  <div class="toolbar" id="toolbar">
    <div class="progress-wrap">
      <div class="progress-top"><span>Copied progress</span><span><b id="progLabel">0 of 0</b></span></div>
      <div class="progress-bar"><i id="progFill"></i></div>
    </div>
    <div class="tool-row" id="filterRow">
      <button class="chip on" data-filter="all" type="button">All <span class="cnt" id="cntAll"></span></button>
      <button class="chip" data-filter="new" type="button">NEW <span class="cnt" id="cntNew"></span></button>
      <button class="chip" data-filter="same" type="button">SAME <span class="cnt" id="cntSame"></span></button>
      <button class="chip" data-filter="uncopied" type="button">Not copied <span class="cnt" id="cntUn"></span></button>
      <button class="chip" data-filter="flagged" type="button">⚠️ Flagged <span class="cnt" id="cntFlag"></span></button>
    </div>
    <div class="tool-row">
      <button class="toggle-chip" id="mergeToggle" type="button" title="Merge all cuts into one tab (script lines only)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <span id="mergeLabel">Merge view</span>
      </button>
      <div class="spacer"></div>
      <button class="btn-copynext" id="copyNextBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
        <span id="copyNextLabel">Copy next</span>
      </button>
    </div>
  </div>

  <!-- 25 resume where I left off -->
  <div class="resume-bar" id="resumeBar">
    <div class="rb-txt" id="resumeTxt"></div>
    <button class="rb-go" id="resumeGo" type="button">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      Resume
    </button>
    <button class="rb-x" id="resumeX" type="button" aria-label="Dismiss">&times;</button>
  </div>

  <details class="dash" id="dash">
    <summary>Session dashboard <span class="chev">&#9662;</span></summary>
    <div class="dash-body" id="dashBody"></div>
  </details>

  <div id="cards"></div>
  <div class="empty" id="empty">No cuts found. Check that the pasted result contains 🦕 cut blocks.</div>

  <!-- #60 version footer -->
  <div class="footer">Scene Cut Splitter <button id="verBtn" type="button">v<span id="verNum"></span></button> &middot; offline</div>

</div>

<!-- #50 scroll-to-top -->
<button class="fab" id="topFab" type="button" aria-label="Scroll to top">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
</button>

<!-- 23 thumb-reachable bottom action bar -->
<div class="bottombar" id="bottomBar">
  <div class="bb-prog">
    <b id="bbProg">0/0</b>
    <span class="bb-mini"><i id="bbFill"></i></span>
  </div>
  <button class="bb-next" id="bbNext" type="button">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    <span id="bbNextLabel">Copy next</span>
  </button>
  <button class="bb-top" id="bbTop" type="button" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
  </button>
</div>

<!-- #35 recent sessions + #60 changelog modal -->
<div class="modal-back" id="modalBack">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h3 id="modalTitle">Recent sessions</h3>
      <button class="mini-btn" id="modalClose" type="button">Close</button>
    </div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
(function(){
  var resultInput = document.getElementById('resultInput');
  var promptInput = document.getElementById('promptInput');
  var generateBtn = document.getElementById('generateBtn');
  var clearBtn    = document.getElementById('clearBtn');
  var cardsEl     = document.getElementById('cards');
  var statusEl    = document.getElementById('status');
  var emptyEl     = document.getElementById('empty');
  var dashEl      = document.getElementById('dash');
  var dashBody    = document.getElementById('dashBody');
  var toolbarEl   = document.getElementById('toolbar');
  var compareEl   = document.getElementById('compare');

  /* new-feature refs (v2.1) */
  var mergeToggle = document.getElementById('mergeToggle');
  var mergeLabel  = document.getElementById('mergeLabel');
  var resumeBar   = document.getElementById('resumeBar');
  var resumeTxt   = document.getElementById('resumeTxt');
  var bottomBar   = document.getElementById('bottomBar');
  var bbProg      = document.getElementById('bbProg');
  var bbFill      = document.getElementById('bbFill');
  var bbNext      = document.getElementById('bbNext');
  var bbNextLabel = document.getElementById('bbNextLabel');

  /* merged-view state (B) — remembered across reloads */
  var mergedView  = lsGet('scs_merged') === '1';

  var BASE_TITLE   = 'Scene Cut Splitter';
  var VERSION      = '2.3';
  var DEFAULT_IMGS = 4;     /* images generated per cut, pick 1 — editable */

  /* #37 currencies — rate is $/image (or ₹/image), editable & remembered per currency */
  var CURRENCIES = {
    USD: { sym:'$', defRate:0.039 },
    INR: { sym:'₹', defRate:3.25 }
  };

  /* #60 changelog shown in the version modal */
  var CHANGELOG = [
    ['2.3', [
      'Notebook skin: small buttons restored to their original clean shape (solid edge, even corners) while keeping the cyan colour — the big blue Generate / Copy-next stamps are unchanged'
    ]],
    ['2.2', [
      'Notebook skin 📓 — midnight field-notebook look (cyan ink, graph paper, handwriting)',
      'Classic stays the default; your pick is remembered as the new default',
      'Notebook is always dark — the light/dark toggle hides while it\'s on',
      'Handwriting fonts cached for offline use after the first online visit'
    ]],
    ['2.1', [
      'Merge view — all script lines in one tab (copy still grabs the full prompt)',
      'Session dashboard now starts collapsed (tap to open); choice remembered',
      'Thumb-reachable bottom bar with progress + Copy next + jump to top',
      'Resume where you left off — jump straight to the first uncopied cut',
      'Text-size slider + compact/comfortable density (⚙ in the header)',
      'Deleted projects go to Trash and can be restored (kept 30 days)',
      'Lifetime cost per project — cumulative spend across sessions',
      'Little celebration when every cut is copied'
    ]],
    ['2.0', [
      'Copy next button + auto-scroll to the next uncopied cut',
      'Copied-progress bar; copied & flagged marks now survive refresh',
      'Filters: NEW / SAME / not copied / flagged',
      'Collapse all cards, duplicate a cut, flag a cut',
      'Multiple saved projects + recent-sessions history (last 5)',
      'Style-prompt presets, USD/INR cost currency, session compare',
      'Installable phone app (offline), paste buttons, scroll-to-top',
      'Two-tap confirm on Clear, vibration on copy'
    ]],
    ['1.0', ['Parse cuts, dashboard, cost estimate, print, themes, undo']]
  ];

  /* current display filter (#12) */
  var currentFilter = 'all';
  var allCollapsed  = false;

  var COPY_ICON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  var PRINT_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>';
  var FLAG_ICON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>';
  var DUP_ICON   = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var CHEV_ICON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

  /* ---------- tiny localStorage helpers (never throw) ---------- */
  function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
  function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
  function lsDel(k){ try{ localStorage.removeItem(k); }catch(e){} }
  function jGet(k, fb){ try{ var v = JSON.parse(lsGet(k)); return v == null ? fb : v; }catch(e){ return fb; } }
  function jSet(k, v){ lsSet(k, JSON.stringify(v)); }
  function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

  /* ---------- runtime state ---------- */
  /* state.cuts holds parsed cut objects that can also carry runtime flags
     (copied / flagged) and duplicates. It is the source of truth for
     rendering and is snapshotted into the current project so copied,
     flagged and duplicated cards survive a refresh (#5 #8 #23). */
  var state = { cuts: [], parts: 1, collapsed: false };

  /* =========================================================
     #29 PROJECTS  — many saved workspaces
     scs_projects : { id: {name, result, prompt, cutsState, parts, lastStats}, ... }
     scs_current  : active project id
     ========================================================= */
  var projectSel   = document.getElementById('projectSel');
  function getProjects(){ return jGet('scs_projects', {}); }
  function saveProjects(p){ jSet('scs_projects', p); }
  function currentProjectId(){ return lsGet('scs_current'); }

  function ensureProject(){
    var projs = getProjects();
    var id = currentProjectId();
    if(!id || !projs[id]){
      /* migrate an old single session if present */
      var legacyR = lsGet('scs_result'), legacyP = lsGet('scs_prompt');
      id = uid();
      projs[id] = { name:'Project 1', result: legacyR || '', prompt: legacyP || '', cutsState:null, parts:1, lastStats:null };
      saveProjects(projs);
      lsSet('scs_current', id);
      lsDel('scs_result'); lsDel('scs_prompt');
    }
    return id;
  }

  function activeProject(){ return getProjects()[currentProjectId()]; }

  /* ---------- 20 lifetime spend per project ----------
     lifetimeImgs = running total of images "committed" (each cut you copy
     counts as imgs/cut images). Cost shown = lifetimeImgs × current rate. */
  function imgsPerCut(){
    var n = parseInt(lsGet('scs_imgs'), 10);
    return (isFinite(n) && n >= 1) ? n : DEFAULT_IMGS;
  }
  function getLifetimeImgs(){
    var p = activeProject();
    return (p && isFinite(p.lifetimeImgs)) ? p.lifetimeImgs : 0;
  }
  function addLifetimeImgs(n){
    var projs = getProjects(); var id = currentProjectId();
    if(!projs[id]) return;
    projs[id].lifetimeImgs = (projs[id].lifetimeImgs || 0) + n;
    saveProjects(projs);
  }

  function persistProject(){
    var projs = getProjects();
    var id = currentProjectId();
    if(!projs[id]) return;
    projs[id].result = resultInput.value;
    projs[id].prompt = promptInput.value;
    projs[id].cutsState = state.cuts.length ? state.cuts.map(function(c){
      return { num:c.num, origNum:c.origNum, vo:c.vo, token:c.token, scene:c.scene,
               framing:c.framing, copied:!!c.copied, flagged:!!c.flagged, dup:!!c.dup, collapsed:!!c.collapsed };
    }) : null;
    projs[id].parts = state.parts;
    saveProjects(projs);
  }

  function renderProjectList(){
    var projs = getProjects();
    var id = currentProjectId();
    projectSel.innerHTML = '';
    Object.keys(projs).forEach(function(pid){
      var o = document.createElement('option');
      o.value = pid; o.textContent = projs[pid].name;
      if(pid === id) o.selected = true;
      projectSel.appendChild(o);
    });
  }

  function switchProject(id){
    persistProject();
    lsSet('scs_current', id);
    loadProjectIntoView();
  }

  function loadProjectIntoView(){
    var p = activeProject();
    resultInput.value = p.result || '';
    promptInput.value = p.prompt || '';
    exitClearConfirm();
    if(p.cutsState && p.cutsState.length){
      state.cuts = p.cutsState.map(function(c){ return c; });
      state.parts = p.parts || 1;
      renderCards();
    } else if((p.result || '').trim()){
      generate();
    } else {
      state.cuts = []; renderCards();
    }
    renderProjectList();
    resumeDismissed = false;   /* 25 re-evaluate per project load */
    maybeShowResume();
  }

  /* =========================================================
     #35 HISTORY — last 5 generated sessions
     ========================================================= */
  function pushHistory(snapshot){
    var h = jGet('scs_history', []);
    h.unshift(snapshot);
    if(h.length > 5) h = h.slice(0,5);
    jSet('scs_history', h);
  }

  /* =========================================================
     #36 STYLE PRESETS
     ========================================================= */
  var presetSel = document.getElementById('presetSel');
  function getPresets(){ return jGet('scs_presets', []); }
  function renderPresetList(){
    var ps = getPresets();
    presetSel.innerHTML = '<option value="">Style presets…</option>';
    ps.forEach(function(p, i){
      var o = document.createElement('option');
      o.value = String(i); o.textContent = p.name;
      presetSel.appendChild(o);
    });
  }

  /* ---------- parsing ---------- */
  function parseCuts(text){
    var cuts = [];
    var lines = text.split(/\r?\n/);
    var i = 0;
    while(i < lines.length){
      var line = lines[i];
      var m = line.match(/🦕\s*(\d+)\s*(.*)/);
      if(m){
        var cut = { num: m[1], origNum: null, vo: (m[2]||'').trim(), token:'', scene:'', framing:'' };
        var j = i + 1;
        while(j < lines.length){
          var l = lines[j];
          if(/🦕\s*\d+/.test(l) || /▶/.test(l) || /AWAITING NEXT PART/.test(l) || /^COMPLETE/.test(l)) break;
          var sm = l.match(/\[(NEW SCENE|SAME SCENE)\]/);
          if(sm && !cut.scene){
            cut.token = sm[1];
            var after = l.slice(l.indexOf('[' + sm[1] + ']') + sm[1].length + 2);
            cut.scene = after.replace(/^\s*↳?\s*/,'').trim();
          } else if(/📷/.test(l)){
            cut.framing = l.replace(/.*📷\s*/,'').replace(/^framing\s*:?\s*/i,'').trim();
          } else if(cut.scene && !cut.framing && l.trim() && !/^[L↳\s]*$/.test(l)){
            if(!/📷/.test(l)) cut.scene += ' ' + l.replace(/^\s*↳?\s*/,'').trim();
          }
          j++;
        }
        if(cut.scene || cut.framing) cuts.push(cut);
        i = j;
      } else {
        i++;
      }
    }
    return cuts;
  }

  /* Multi-part merge: detect numbering restarts (a new pasted part
     starting over at 1) and renumber everything into one sequence. */
  function mergeParts(cuts){
    var restarts = 0;
    for(var i = 1; i < cuts.length; i++){
      if(parseInt(cuts[i].num,10) <= parseInt(cuts[i-1].num,10)) restarts++;
    }
    if(restarts > 0){
      cuts.forEach(function(c, k){
        c.origNum = c.num;
        c.num = String(k + 1);
      });
    }
    return restarts + 1; /* number of parts detected */
  }

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function words(s){
    s = (s||'').trim();
    return s ? s.split(/\s+/).length : 0;
  }

  function fmtTime(totalSec){
    var m = Math.floor(totalSec / 60);
    var s = Math.round(totalSec % 60);
    if(s === 60){ m++; s = 0; }
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  /* ---------- session dashboard ---------- */
  function renderDashboard(cuts, newCount, sameCount, parts){
    var total = cuts.length;
    var voWordsTotal = 0, descWordsTotal = 0;
    cuts.forEach(function(c){
      voWordsTotal   += words(c.vo);
      descWordsTotal += words(c.scene);
    });

    /* Estimated runtime: VO words at ~150 wpm (2.5 words/sec) */
    var runtimeSec = voWordsTotal / 2.5;

    /* Scene runs: each NEW SCENE starts a run; SAME SCENE extends it */
    var runs = [];
    cuts.forEach(function(c){
      if(c.token === 'SAME SCENE' && runs.length){ runs[runs.length - 1]++; }
      else { runs.push(1); }
    });
    var maxRun = runs.reduce(function(a,b){ return Math.max(a,b); }, 1);

    var avgWords = total ? Math.round(descWordsTotal / total) : 0;
    var pctNew = total ? (newCount / total * 100) : 0;

    var cur = lsGet('scs_currency'); if(cur !== 'INR') cur = 'USD';
    function rateFor(c){
      var saved = parseFloat(lsGet('scs_rate_' + c));
      return (isFinite(saved) && saved >= 0) ? saved : CURRENCIES[c].defRate;
    }
    var savedImgs = parseInt(lsGet('scs_imgs'), 10);
    var imgs = (isFinite(savedImgs) && savedImgs >= 1) ? savedImgs : DEFAULT_IMGS;

    var html = '';

    /* #1 scene breakdown bar */
    html += '<div><div class="dash-h">Scene breakdown</div>' +
      '<div class="ratio">' +
        '<i class="r-new" style="width:' + pctNew.toFixed(1) + '%"></i>' +
        '<i class="r-same" style="width:' + (100 - pctNew).toFixed(1) + '%"></i>' +
      '</div>' +
      '<div class="ratio-legend">' +
        '<span><span class="sw n"></span>' + newCount + ' NEW SCENE</span>' +
        '<span><span class="sw s"></span>' + sameCount + ' SAME SCENE</span>' +
        (parts > 1 ? '<span>' + parts + ' parts merged</span>' : '') +
      '</div></div>';

    /* stat tiles: cuts, scenes, est runtime (#2), avg words */
    html += '<div class="tiles">' +
      '<div class="tile"><b>' + total + '</b><span>Cuts</span></div>' +
      '<div class="tile"><b>' + runs.length + '</b><span>Scenes</span></div>' +
      '<div class="tile"><b>~' + fmtTime(runtimeSec) + '</b><span>Est. runtime</span></div>' +
      '<div class="tile"><b>' + avgWords + '</b><span>Avg words/cut</span></div>' +
    '</div>';

    /* #7 + #37 cost estimate — editable rate + images/cut, USD or INR */
    html += '<div class="cost-row">🍌 Nano Banana 2 (Google Flow) &mdash; ' +
      '<span class="cur-toggle" id="curToggle">' +
        '<button type="button" data-cur="USD"' + (cur === 'USD' ? ' class="on"' : '') + '>$ USD</button>' +
        '<button type="button" data-cur="INR"' + (cur === 'INR' ? ' class="on"' : '') + '>₹ INR</button>' +
      '</span> ' +
      '<label for="rateInput" id="rateLbl">' + CURRENCIES[cur].sym + '/image</label> ' +
      '<input id="rateInput" type="number" min="0" step="0.001" inputmode="decimal" value="' + rateFor(cur) + '"> ' +
      '&times; ' +
      '<label for="imgsInput">imgs/cut</label> ' +
      '<input id="imgsInput" type="number" min="1" step="1" inputmode="numeric" value="' + imgs + '"> ' +
      '&times; ' + total + ' cuts = <b id="costOut"></b>' +
      '<span id="imgsOut"></span></div>';

    /* 20 lifetime spend for this project */
    html += '<div class="cost-row" style="background:var(--same-soft)">📈 Lifetime this project &mdash; ' +
      '<b id="lifeImgs">0</b> imgs generated &asymp; <b id="lifeCost"></b></div>';

    /* #4 scene-length distribution */
    html += '<div><div class="dash-h">Scene length (cuts per scene)</div><div class="dist">';
    runs.forEach(function(len, i){
      var w = Math.max(4, len / maxRun * 100);
      html += '<div class="dist-row">' +
        '<span class="lbl">Scene ' + (i + 1) + '</span>' +
        '<span class="bar"><i style="width:' + w.toFixed(1) + '%"></i></span>' +
        '<span class="val">' + len + ' cut' + (len > 1 ? 's' : '') + '</span>' +
      '</div>';
    });
    html += '</div></div>';

    /* #16 print / PDF */
    html += '<div class="dash-actions"><button class="btn btn-print" id="printBtn" type="button">' +
      PRINT_ICON + '<span>Print / PDF</span></button></div>';

    dashBody.innerHTML = html;
    dashEl.classList.add('show');

    var rateInput = document.getElementById('rateInput');
    var imgsInput = document.getElementById('imgsInput');
    var costOut   = document.getElementById('costOut');
    var imgsOut   = document.getElementById('imgsOut');
    var rateLbl   = document.getElementById('rateLbl');
    var lifeImgs  = document.getElementById('lifeImgs');
    var lifeCost  = document.getElementById('lifeCost');
    function updateCost(){
      var r = parseFloat(rateInput.value);
      if(!isFinite(r) || r < 0) r = 0;
      var n = parseInt(imgsInput.value, 10);
      if(!isFinite(n) || n < 1) n = 1;
      var totalImgs = n * total;
      costOut.textContent = CURRENCIES[cur].sym + (r * totalImgs).toFixed(2);
      imgsOut.textContent = ' (' + totalImgs + ' imgs)';
      lsSet('scs_rate_' + cur, String(r));
      lsSet('scs_imgs', String(n));
      /* 20 lifetime — uses the same editable rate */
      var life = getLifetimeImgs();
      lifeImgs.textContent = life.toLocaleString();
      lifeCost.textContent = CURRENCIES[cur].sym + (r * life).toFixed(2);
    }
    rateInput.addEventListener('input', updateCost);
    imgsInput.addEventListener('input', updateCost);
    updateCost();

    /* #37 currency switch */
    var curToggle = document.getElementById('curToggle');
    curToggle.addEventListener('click', function(e){
      var b = e.target.closest('button[data-cur]');
      if(!b) return;
      cur = b.getAttribute('data-cur');
      lsSet('scs_currency', cur);
      Array.prototype.forEach.call(curToggle.querySelectorAll('button'), function(x){
        x.classList.toggle('on', x.getAttribute('data-cur') === cur);
      });
      rateLbl.textContent = CURRENCIES[cur].sym + '/image';
      rateInput.value = rateFor(cur);
      updateCost();
    });

    document.getElementById('printBtn').addEventListener('click', function(){
      window.print();
    });
  }

  /* ---------- derived fields for one cut ---------- */
  function deriveCut(cut, stylePrompt){
    var isSame = cut.token === 'SAME SCENE';
    var fullDesc = cut.scene + (cut.framing ? ' Camera framing: ' + cut.framing + '.' : '');
    var fullCopy = (!isSame && stylePrompt ? stylePrompt + '\n\n' : '') + fullDesc;
    return { isSame: isSame, fullDesc: fullDesc, fullCopy: fullCopy };
  }

  /* ---------- #44 compute compact stats for compare ---------- */
  function statsOf(cuts){
    var newCount = 0, sameCount = 0, scenes = 0;
    cuts.forEach(function(c){
      if(c.token === 'SAME SCENE') sameCount++; else newCount++;
      if(c.token !== 'SAME SCENE') scenes++;
    });
    if(scenes === 0 && cuts.length) scenes = 1;
    return { cuts: cuts.length, newCount: newCount, sameCount: sameCount, scenes: scenes };
  }

  /* ---------- generate: parse fresh from the text boxes ---------- */
  function generate(){
    var raw = resultInput.value || '';
    if(!raw.trim()){
      state.cuts = [];
      renderCards();
      return;
    }
    var cuts = parseCuts(raw);
    var parts = mergeParts(cuts);

    /* #44 compare against the previous generation of THIS project */
    var proj = activeProject();
    var prev = proj ? proj.lastStats : null;
    var now  = statsOf(cuts);
    showCompare(prev, now);

    /* fresh generation resets copied/flagged/dup */
    state.cuts = cuts.map(function(c){
      return { num:c.num, origNum:c.origNum, vo:c.vo, token:c.token, scene:c.scene,
               framing:c.framing, copied:false, flagged:false, dup:false };
    });
    state.parts = parts;

    /* #35 history + save lastStats for next compare */
    if(cuts.length){
      var proj2 = getProjects()[currentProjectId()];
      pushHistory({ name: (proj2 ? proj2.name : 'Project') + ' · ' + new Date().toLocaleString(),
                    result: raw, prompt: promptInput.value,
                    cuts: now.cuts, scenes: now.scenes, time: Date.now() });
      var projs = getProjects();
      if(projs[currentProjectId()]) projs[currentProjectId()].lastStats = now;
      saveProjects(projs);
    }

    renderCards();
    persistProject();
  }

  function showCompare(prev, now){
    if(!prev || !now.cuts){ compareEl.classList.remove('show'); return; }
    function delta(label, a, b){
      var d = b - a;
      if(d === 0) return '<span class="flat">' + label + ' ' + b + ' (no change)</span>';
      var cls = d > 0 ? 'up' : 'down';
      return '<span class="' + cls + '">' + label + ' ' + (d > 0 ? '+' : '') + d + '</span>';
    }
    compareEl.innerHTML = '<span>vs last generate:</span>' +
      delta('cuts', prev.cuts, now.cuts) +
      delta('scenes', prev.scenes, now.scenes);
    compareEl.classList.add('show');
  }

  /* ---------- #12 filter test ---------- */
  function passesFilter(cut){
    var i = state.cuts.indexOf(cut);
    switch(currentFilter){
      case 'new':      return !isContinuation(cut, i);  /* standalone lone NEW */
      case 'same':     return isContinuation(cut, i);   /* new + same */
      case 'uncopied': return !cut.copied;
      case 'flagged':  return !!cut.flagged;
      default:         return true;
    }
  }

  /* ---------- render the cards from state.cuts ---------- */
  function renderCards(){
    var stylePrompt = (promptInput.value || '').trim();
    var cuts = state.cuts;

    cardsEl.innerHTML = '';
    statusEl.innerHTML = ''; statusEl.classList.remove('show');
    emptyEl.classList.remove('show');
    dashEl.classList.remove('show'); dashBody.innerHTML = '';
    toolbarEl.classList.remove('show');
    bottomBar.classList.remove('show');
    document.body.classList.remove('has-bottombar');
    document.title = BASE_TITLE;

    if(!(resultInput.value || '').trim() && !cuts.length){
      emptyEl.textContent = 'Paste the Step 1 result in box 1, then tap Generate.';
      emptyEl.classList.add('show');
      return;
    }
    if(cuts.length === 0){
      emptyEl.textContent = 'No cuts found. Check that the pasted result contains 🦕 cut blocks.';
      emptyEl.classList.add('show');
      return;
    }

    var s = statsOf(cuts);
    document.title = cuts.length + ' cuts — ' + BASE_TITLE;

    var visible = 0;
    var frag = document.createDocumentFragment();

    if(mergedView){
      visible = buildMergedInto(frag, cuts, stylePrompt);
    } else {
    cuts.forEach(function(cut, idx){
      if(!passesFilter(cut)) return;
      visible++;
      var d = deriveCut(cut, stylePrompt);

      var card = document.createElement('article');
      card.className = 'card' + (cut.copied ? ' done' : '') + (cut.flagged ? ' flagged' : '') +
                       (cut.dup ? ' dup' : '') + (cut.collapsed ? ' collapsed' : '');
      card.style.animationDelay = Math.min(idx * 30, 360) + 'ms';

      var badgeClass = d.isSame ? 'same' : 'new';
      var badgeText  = cut.token || 'NEW SCENE';

      var descHtml = '';
      if(!d.isSame && stylePrompt){
        descHtml += '<span class="style-part">' + esc(stylePrompt) + '</span><hr class="divider">';
      }
      descHtml += '<span class="scene-part">' + esc(d.fullDesc) + '</span>';

      var dWords = words(d.fullDesc);
      var metaHtml = '<div class="cut-meta">' +
        '<span>' + dWords + ' words</span>' +
        '<span>' + d.fullDesc.length + ' chars</span>' +
        '<span>prompt ' + d.fullCopy.length + ' chars</span>' +
        (cut.vo ? '<span>line ' + words(cut.vo) + ' words</span>' : '') +
      '</div>';

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="cut-no">🦕 ' + esc(cut.num) + '</span>' +
          (cut.origNum ? '<span class="was">was ' + esc(cut.origNum) + '</span>' : '') +
          '<span class="badge ' + badgeClass + '">' + esc(badgeText) + '</span>' +
          '<div class="card-tools">' +
            '<button class="icon-mini flag' + (cut.flagged ? ' on' : '') + '" title="Flag to revisit" aria-label="Flag">' + FLAG_ICON + '</button>' +
            '<button class="icon-mini dupBtn" title="Duplicate this cut" aria-label="Duplicate">' + DUP_ICON + '</button>' +
            '<button class="icon-mini colBtn" title="Collapse/expand" aria-label="Collapse">' + CHEV_ICON + '</button>' +
            '<button class="btn btn-copy' + (cut.copied ? ' copied' : '') + '">' + (cut.copied ? CHECK_ICON + '<span>Copied</span>' : COPY_ICON + '<span>Copy</span>') + '</button>' +
          '</div>' +
        '</div>' +
        (cut.vo ? '<div class="vo-line"><b>Line:</b> ' + esc(cut.vo) + '</div>' : '') +
        '<div class="card-body">' +
          '<div class="desc-box">' + descHtml + '</div>' +
          metaHtml +
          (cut.framing ? '<div class="framing">📷 <span>' + esc(cut.framing) + '</span></div>' : '') +
        '</div>';

      /* copy (#5 mark + persist, #53 haptic) */
      var copyBtn = card.querySelector('.btn-copy');
      copyBtn.addEventListener('click', function(){
        copyText(d.fullCopy, copyBtn, card, cut);
      });
      /* #8 flag */
      card.querySelector('.flag').addEventListener('click', function(){
        cut.flagged = !cut.flagged;
        persistProject();
        renderCards();
      });
      /* #23 duplicate */
      card.querySelector('.dupBtn').addEventListener('click', function(){
        var copy = { num:cut.num, origNum:cut.origNum, vo:cut.vo, token:cut.token,
                     scene:cut.scene, framing:cut.framing, copied:false, flagged:false, dup:true };
        state.cuts.splice(idx + 1, 0, copy);
        persistProject();
        renderCards();
      });
      /* per-card collapse */
      card.querySelector('.colBtn').addEventListener('click', function(){
        cut.collapsed = !cut.collapsed;
        card.classList.toggle('collapsed', cut.collapsed);
        persistProject();
      });

      frag.appendChild(card);

      /* connector only in the unfiltered view */
      if(currentFilter === 'all' && !allCollapsed){
        var next = cuts[idx + 1];
        if(next && next.token === 'SAME SCENE'){
          card.classList.add('linked');
          var conn = document.createElement('div');
          conn.className = 'connector';
          frag.appendChild(conn);
        }
      }
    });
    }

    cardsEl.appendChild(frag);

    if(visible === 0){
      emptyEl.textContent = 'No cuts match this filter.';
      emptyEl.classList.add('show');
    }

    statusEl.innerHTML =
      '<span><b>' + cuts.length + '</b> cuts</span>' +
      '<span class="pill-new"><b>' + s.newCount + '</b> NEW SCENE</span>' +
      '<span class="pill-same"><b>' + s.sameCount + '</b> SAME SCENE</span>' +
      (state.parts > 1 ? '<span class="pill-merge"><b>' + state.parts + '</b> parts merged &middot; renumbered</span>' : '');
    statusEl.classList.add('show');

    updateToolbar(s);
    renderDashboard(cuts, s.newCount, s.sameCount, state.parts);
  }

  /* ---------- B: build the single merged tab (script lines only) ----------
     One card holds every cut as a compact row: number + scene dot + the
     script line. The copy button still copies the FULL prompt (style block +
     that cut's description), exactly like the normal card. */
  function buildMergedInto(frag, cuts, stylePrompt){
    var card = document.createElement('article');
    card.className = 'card merged';
    var visible = 0, rowsHtml = '';
    cuts.forEach(function(cut, idx){
      if(!passesFilter(cut)) return;
      visible++;
      var isSame = cut.token === 'SAME SCENE';
      var lineTxt = (cut.vo || '').trim();
      var body = lineTxt
        ? esc(lineTxt)
        : '<span class="mmuted">' + esc((cut.scene || 'No line').slice(0, 120)) + (cut.scene && cut.scene.length > 120 ? '…' : '') + '</span>';
      rowsHtml +=
        '<div class="mrow' + (cut.copied ? ' done' : '') + (cut.flagged ? ' flagged' : '') + '" data-ci="' + idx + '">' +
          '<span class="mdot ' + (isSame ? 's' : 'n') + '"></span>' +
          '<span class="mno">🦕 ' + esc(cut.num) + '</span>' +
          '<span class="mtext">' + body + '</span>' +
          '<button class="mcopy' + (cut.copied ? ' copied' : '') + '" title="Copy full prompt" aria-label="Copy full prompt">' +
            (cut.copied ? CHECK_ICON : COPY_ICON) +
          '</button>' +
        '</div>';
    });
    if(visible === 0) return 0;   /* let the empty-state message show instead */

    card.innerHTML =
      '<div class="merged-head">Script lines <span class="mh-cnt">' + visible + ' shown · copy = full prompt</span></div>' +
      rowsHtml;

    /* wire each row's copy button */
    Array.prototype.forEach.call(card.querySelectorAll('.mrow'), function(row){
      var ci  = parseInt(row.getAttribute('data-ci'), 10);
      var cut = cuts[ci];
      var d   = deriveCut(cut, stylePrompt);
      var btn = row.querySelector('.mcopy');
      btn.addEventListener('click', function(){
        copyText(d.fullCopy, btn, row, cut, { scrollNext:false });
      });
    });
    frag.appendChild(card);
    return visible;
  }

  /* ---------- scene index: small 1..last numbers split into two groups ----------
     A cut is a "continuation" (New + Same) when it is a SAME SCENE, or a
     NEW SCENE immediately followed by a SAME SCENE (the start of a pair).
     Everything else is a lone "New" (standalone). Numbers are the cut's
     position in the full list (1 to last), independent of its 🦕 number,
     and tapping one jumps to that card. */
  function isContinuation(cut, i){
    if(cut.token === 'SAME SCENE') return true;
    var next = state.cuts[i + 1];
    return !!(next && next.token === 'SAME SCENE');
  }

  /* ---------- #2 #4 #12 toolbar (progress, filters, copy-next) ---------- */
  function updateToolbar(s){
    toolbarEl.classList.add('show');
    var copied = 0, uncopied = 0, flagged = 0, cont = 0;
    state.cuts.forEach(function(c, i){
      if(c.copied) copied++; else uncopied++;
      if(c.flagged) flagged++;
      if(isContinuation(c, i)) cont++;
    });
    var total = state.cuts.length;
    document.getElementById('progLabel').textContent = copied + ' of ' + total;
    document.getElementById('progFill').style.width = (total ? copied / total * 100 : 0) + '%';
    document.getElementById('cntAll').textContent  = total;
    document.getElementById('cntNew').textContent  = total - cont; /* standalone */
    document.getElementById('cntSame').textContent = cont;         /* new + same */
    document.getElementById('cntUn').textContent   = uncopied;
    document.getElementById('cntFlag').textContent = flagged;

    var nextBtn = document.getElementById('copyNextBtn');
    var label   = document.getElementById('copyNextLabel');
    if(uncopied === 0){
      nextBtn.disabled = true; label.textContent = 'All copied ✓';
    } else {
      nextBtn.disabled = false; label.textContent = 'Copy next (' + uncopied + ' left)';
    }

    /* 23 mirror progress + copy-next into the thumb-reach bottom bar */
    var pct = total ? copied / total * 100 : 0;
    bbProg.textContent = copied + '/' + total;
    bbFill.style.width = pct + '%';
    if(uncopied === 0){
      bbNext.disabled = true; bbNextLabel.textContent = 'All copied ✓';
    } else {
      bbNext.disabled = false; bbNextLabel.textContent = 'Copy next';
    }
    bottomBar.classList.toggle('show', total > 0);
    document.body.classList.toggle('has-bottombar', total > 0);
  }

  /* ---------- #53 haptic tap ---------- */
  function buzz(ms){ try{ if(navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

  /* ---------- copy (#5 persist mark, #3 auto-scroll, #53 haptic) ---------- */
  function copyText(text, btn, card, cut, opts){
    opts = opts || {};
    function done(ok){
      if(!ok) return;
      buzz(15);
      var wasCopied = cut ? !!cut.copied : true;
      if(cut){
        cut.copied = true;
        persistProject();
        if(!wasCopied) addLifetimeImgs(imgsPerCut());   /* 20 */
      }
      btn.classList.add('copied');
      if(btn.classList && btn.classList.contains && btn.classList.contains('mcopy')){
        btn.innerHTML = CHECK_ICON;                     /* merged icon-only button */
      } else {
        btn.innerHTML = CHECK_ICON + '<span>Copied</span>';
      }
      if(card && card.classList) card.classList.add('done');
      hideResume();                                     /* 25 */
      /* refresh progress bar + counts without a full re-render flicker */
      var s = statsOf(state.cuts);
      updateToolbar(s);
      refreshLifetimeUI();                              /* 20 keep figure live */
      /* 31 celebrate the moment the final cut gets copied */
      if(!wasCopied && state.cuts.length && state.cuts.every(function(c){ return c.copied; })) celebrate();
      /* #3 auto-scroll to the next un-copied card */
      if(opts.scrollNext !== false) scrollToNextUncopied(cut);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){done(true);}, function(){fallbackCopy(text, done);});
    } else {
      fallbackCopy(text, done);
    }
  }

  /* #3 find + smooth-scroll to the next uncopied card after `afterCut` */
  function scrollToNextUncopied(afterCut){
    var startIdx = afterCut ? state.cuts.indexOf(afterCut) + 1 : 0;
    var target = null;
    for(var i = startIdx; i < state.cuts.length; i++){
      if(!state.cuts[i].copied){ target = state.cuts[i]; break; }
    }
    if(!target){
      for(var j = 0; j < state.cuts.length; j++){
        if(!state.cuts[j].copied){ target = state.cuts[j]; break; }
      }
    }
    if(!target) return;
    if(!passesFilter(target)) return;
    /* merged view: scroll to the matching row */
    if(mergedView){
      var row = cardsEl.querySelector('.mrow[data-ci="' + state.cuts.indexOf(target) + '"]');
      if(row) row.scrollIntoView({ behavior:'smooth', block:'center' });
      return;
    }
    /* map the target cut to its rendered card (respecting current filter) */
    var visIndex = -1, k;
    for(k = 0; k < state.cuts.length; k++){
      if(passesFilter(state.cuts[k])) visIndex++;
      if(state.cuts[k] === target) break;
    }
    var el = cardsEl.querySelectorAll('.card')[visIndex];
    if(el) el.scrollIntoView({ behavior:'smooth', block:'center' });
  }

  function getTrash(){ return jGet('scs_trash', {}); }
  function saveTrash(t){ jSet('scs_trash', t); }
  function purgeTrash(){
    var t = getTrash(), now = Date.now(), changed = false;
    Object.keys(t).forEach(function(k){
      if(!t[k].deletedAt || (now - t[k].deletedAt) > 30 * 864e5){ delete t[k]; changed = true; }
    });
    if(changed) saveTrash(t);
  }
  function openTrash(){
    purgeTrash();
    var t = getTrash();
    var keys = Object.keys(t).sort(function(a,b){ return t[b].deletedAt - t[a].deletedAt; });
    modalTitle.textContent = 'Trash';
    if(!keys.length){
      modalBody.innerHTML = '<div class="hist-empty">Trash is empty.<br>Deleted projects appear here for 30 days.</div>';
    } else {
      modalBody.innerHTML = '<div class="trash-sub">Deleted projects are kept for 30 days, then removed automatically.</div>' +
        keys.map(function(k){
          var it = t[k];
          var when = new Date(it.deletedAt).toLocaleDateString();
          var cuts = (it.project && it.project.cutsState) ? it.project.cutsState.length : 0;
          return '<div class="hist-item">' +
            '<div class="hi-main">' +
              '<div class="hi-name">' + esc(it.project ? it.project.name : 'Untitled') + '</div>' +
              '<div class="hi-sub">deleted ' + esc(when) + ' · ' + cuts + ' cuts</div>' +
            '</div>' +
            '<div class="hi-actions">' +
              '<button class="mini-btn" data-restore="' + k + '" type="button">Restore</button>' +
              '<button class="mini-btn danger" data-purge="' + k + '" type="button">Delete</button>' +
            '</div>' +
          '</div>';
        }).join('');
    }
    openModal();
  }
  document.getElementById('trashBtn').addEventListener('click', openTrash);
  modalBody.addEventListener('click', function(e){
    var rb = e.target.closest('button[data-restore]');
    var pb = e.target.closest('button[data-purge]');
    if(rb){
      var t = getTrash(), key = rb.getAttribute('data-restore'), entry = t[key];
      if(!entry) return;
      delete t[key]; saveTrash(t);
      persistProject();
      var projs = getProjects();
      var nid = uid();
      projs[nid] = entry.project || { name:'Restored', result:'', prompt:'', cutsState:null, parts:1, lastStats:null };
      saveProjects(projs);
      lsSet('scs_current', nid);
      loadProjectIntoView();
      openTrash();
    } else if(pb){
      var t2 = getTrash(), key2 = pb.getAttribute('data-purge');
      if(t2[key2] && confirm('Permanently delete "' + (t2[key2].project ? t2[key2].project.name : 'this project') + '"? This cannot be undone.')){
        delete t2[key2]; saveTrash(t2); openTrash();
      }
    }
  });

  /* ---------- boot ---------- */
  ensureProject();
  purgeTrash();
  renderPresetList();
  loadProjectIntoView();
})();
</script>
</body>
</html>
