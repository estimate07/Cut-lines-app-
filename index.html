<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Scene Cut Splitter</title>
<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel-2:#1d212b;
    --line:#2a2f3c;
    --ink:#e8eaf0;
    --ink-dim:#9aa1b2;
    --ink-faint:#6b7280;
    --accent:#f59a3c;
    --accent-soft:rgba(245,154,60,.14);
    --new:#4cc38a;
    --new-soft:rgba(76,195,138,.13);
    --same:#6ea8fe;
    --same-soft:rgba(110,168,254,.13);
    --radius:16px;
    --radius-sm:10px;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:15px;
    line-height:1.55;
    min-height:100vh;
    padding:22px 16px calc(60px + env(safe-area-inset-bottom));
  }
  .wrap{max-width:820px;margin:0 auto}

  /* ---------- header ---------- */
  header{margin-bottom:22px}
  .brand{
    display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
  }
  .brand h1{
    font-size:20px;font-weight:700;letter-spacing:.2px;
  }
  .brand .dot{
    width:9px;height:9px;border-radius:50%;
    background:var(--accent);
    align-self:center;
    box-shadow:0 0 12px rgba(245,154,60,.55);
  }
  .brand small{color:var(--ink-faint);font-size:12.5px;font-weight:500}

  /* ---------- input panel ---------- */
  .inputs{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px;
    display:flex;flex-direction:column;gap:14px;
  }
  .field label{
    display:flex;align-items:center;gap:8px;
    font-size:12px;font-weight:600;
    letter-spacing:.6px;text-transform:uppercase;
    color:var(--ink-dim);
    margin-bottom:7px;
  }
  .field label .num{
    display:inline-flex;align-items:center;justify-content:center;
    width:18px;height:18px;border-radius:6px;
    background:var(--accent-soft);color:var(--accent);
    font-size:11px;font-weight:700;
  }
  textarea{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    color:var(--ink);
    font-family:var(--mono);
    font-size:12.5px;
    line-height:1.5;
    padding:11px 12px;
    resize:vertical;
    outline:none;
    transition:border-color .18s, box-shadow .18s;
  }
  textarea::placeholder{color:var(--ink-faint)}
  textarea:focus{
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--accent-soft);
  }
  #resultInput{min-height:120px;max-height:220px}
  #promptInput{min-height:72px;max-height:150px}

  .actions{display:flex;gap:10px;align-items:center}
  .btn{
    appearance:none;border:none;cursor:pointer;
    font-family:var(--sans);font-weight:600;
    border-radius:var(--radius-sm);
    transition:transform .12s, background .18s, color .18s, box-shadow .18s;
    -webkit-tap-highlight-color:transparent;
  }
  .btn:active{transform:scale(.97)}
  .btn-generate{
    flex:1;
    background:var(--accent);
    color:#141005;
    font-size:14.5px;
    padding:12px 18px;
    box-shadow:0 4px 18px rgba(245,154,60,.28);
  }
  .btn-generate:hover{background:#ffab53}
  .btn-clear{
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:13px;
    padding:11px 16px;
  }
  .btn-clear:hover{color:var(--ink);border-color:var(--ink-faint)}

  /* ---------- status strip ---------- */
  .status{
    display:none;
    margin:18px 2px 4px;
    font-size:12.5px;font-weight:600;
    letter-spacing:.4px;
    color:var(--ink-dim);
  }
  .status.show{display:flex;gap:14px;flex-wrap:wrap}
  .status b{color:var(--ink)}
  .status .pill-new{color:var(--new)}
  .status .pill-same{color:var(--same)}
  .status .err{color:#ff7d7d}

  /* ---------- cut cards ---------- */
  #cards{display:flex;flex-direction:column;gap:0;margin-top:14px}
  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    margin-bottom:14px;
    animation:rise .35s cubic-bezier(.2,.7,.3,1) both;
    transition:border-color .2s;
  }
  .card.linked{margin-bottom:0}
  .card:hover{border-color:#3a4152}
  @keyframes rise{
    from{opacity:0;transform:translateY(10px)}
    to{opacity:1;transform:none}
  }
  .card-head{
    display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    padding:12px 14px;
    border-bottom:1px solid var(--line);
    background:var(--panel-2);
  }
  .cut-no{
    font-family:var(--mono);
    font-size:14px;font-weight:700;
    color:var(--ink);
    white-space:nowrap;
  }
  .badge{
    font-size:10.5px;font-weight:700;
    letter-spacing:.7px;
    padding:4px 9px;border-radius:999px;
    white-space:nowrap;
  }
  .badge.new{background:var(--new-soft);color:var(--new)}
  .badge.same{background:var(--same-soft);color:var(--same)}
  .card-head .btn-copy{margin-left:auto}
  .btn-copy{
    display:inline-flex;align-items:center;gap:6px;
    background:transparent;
    border:1px solid var(--line);
    color:var(--ink-dim);
    font-size:12px;font-weight:600;
    padding:7px 13px;
    border-radius:999px;
  }
  .btn-copy:hover{color:var(--ink);border-color:var(--ink-faint)}
  .btn-copy.copied{
    background:var(--new-soft);
    border-color:transparent;
    color:var(--new);
  }
  .btn-copy svg{width:13px;height:13px;flex:none}

  .vo-line{
    padding:10px 14px 0;
    font-size:12.5px;
    line-height:1.5;
    color:var(--ink-dim);
    font-style:italic;
  }
  .vo-line b{color:var(--ink);font-style:normal;font-weight:600}

  .card-body{padding:14px}
  .desc-box{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius-sm);
    padding:12px 13px;
    max-height:300px;
    overflow-y:auto;
    font-family:var(--mono);
    font-size:12px;
    line-height:1.6;
    color:var(--ink-dim);
    white-space:pre-wrap;
    word-break:break-word;
    -webkit-overflow-scrolling:touch;
  }
  .desc-box .style-part{color:var(--ink-faint)}
  .desc-box .divider{
    display:block;
    border:none;border-top:1px dashed var(--line);
    margin:10px 0;
  }
  .desc-box .scene-part{color:var(--ink)}

  .framing{
    display:flex;align-items:center;gap:8px;
    margin-top:11px;
    font-size:12.5px;font-weight:600;
    color:var(--accent);
    background:var(--accent-soft);
    border-radius:var(--radius-sm);
    padding:9px 12px;
  }
  .framing span{color:var(--ink);font-weight:500}

  /* ---------- animated connector ---------- */
  .connector{
    width:3px;height:34px;
    margin:0 auto;
    border-radius:3px;
    background:repeating-linear-gradient(
      to bottom,
      var(--same) 0 6px,
      transparent 6px 12px
    );
    background-size:100% 24px;
    animation:flow 1.1s linear infinite;
    opacity:.85;
  }
  @keyframes flow{
    from{background-position:0 0}
    to{background-position:0 24px}
  }

  .empty{
    display:none;
    text-align:center;
    color:var(--ink-faint);
    font-size:13.5px;
    padding:46px 20px;
    border:1px dashed var(--line);
    border-radius:var(--radius);
    margin-top:16px;
  }
  .empty.show{display:block}

  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-thumb{background:#2e3442;border-radius:8px}
  ::-webkit-scrollbar-track{background:transparent}

  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
  }
  @media (max-width:520px){
    body{padding:16px 10px calc(48px + env(safe-area-inset-bottom))}
    .inputs{padding:13px}
    .card-head{padding:10px 12px}
    .card-body{padding:12px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>Scene Cut Splitter</h1>
      <small>offline &middot; paste &rarr; generate &rarr; copy</small>
    </div>
  </header>

  <section class="inputs">
    <div class="field">
      <label><span class="num">1</span> Full result -- Step 1 output</label>
      <textarea id="resultInput" placeholder="Paste the full part output here (all 🦕 cut blocks)…" spellcheck="false"></textarea>
    </div>
    <div class="field">
      <label><span class="num">2</span> Text to image prompt</label>
      <textarea id="promptInput" placeholder="Paste the text-to-image style prompt here…" spellcheck="false"></textarea>
    </div>
    <div class="actions">
      <button class="btn btn-generate" id="generateBtn">Generate</button>
      <button class="btn btn-clear" id="clearBtn">Clear</button>
    </div>
  </section>

  <div class="status" id="status"></div>
  <div id="cards"></div>
  <div class="empty" id="empty">No cuts found. Check that the pasted result contains 🦕 cut blocks.</div>

</div>

<script>
(function(){
  var resultInput = document.getElementById('resultInput');
  var promptInput = document.getElementById('promptInput');
  var generateBtn = document.getElementById('generateBtn');
  var clearBtn    = document.getElementById('clearBtn');
  var cardsEl     = document.getElementById('cards');
  var statusEl    = document.getElementById('status');
  var emptyEl     = document.getElementById('empty');

  var COPY_ICON  = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
  var CHECK_ICON = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

  function parseCuts(text){
    var cuts = [];
    var lines = text.split(/\r?\n/);
    var i = 0;
    while(i < lines.length){
      var line = lines[i];
      var m = line.match(/🦕\s*(\d+)\s*(.*)/);
      if(m){
        var cut = { num: m[1], vo: (m[2]||'').trim(), token:'', scene:'', framing:'' };
        var j = i + 1;
        while(j < lines.length){
          var l = lines[j];
          if(/🦕\s*\d+/.test(l) || /▶/.test(l) || /AWAITING NEXT PART/.test(l) || /^COMPLETE/.test(l)) break;
          var sm = l.match(/\[(NEW SCENE|SAME SCENE)\]/);
          if(sm && !cut.scene){
            cut.token = sm[1];
            var after = l.slice(l.indexOf('[' + sm[1] + ']') + sm[1].length + 2);
            cut.scene = after.replace(/^\s*↳?\s*/,'').trim();
          } else if(/📷/.test(l)){
            cut.framing = l.replace(/.*📷\s*/,'').replace(/^framing\s*:?\s*/i,'').trim();
          } else if(cut.scene && !cut.framing && l.trim() && !/^[L↳\s]*$/.test(l)){
            if(!/📷/.test(l)) cut.scene += ' ' + l.replace(/^\s*↳?\s*/,'').trim();
          }
          j++;
        }
        if(cut.scene || cut.framing) cuts.push(cut);
        i = j;
      } else {
        i++;
      }
    }
    return cuts;
  }

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function render(){
    var raw = resultInput.value || '';
    var stylePrompt = (promptInput.value || '').trim();
    var cuts = parseCuts(raw);

    cardsEl.innerHTML = '';
    statusEl.innerHTML = '';
    statusEl.classList.remove('show');
    emptyEl.classList.remove('show');

    if(!raw.trim()){
      emptyEl.textContent = 'Paste the Step 1 result in box 1, then tap Generate.';
      emptyEl.classList.add('show');
      return;
    }
    if(cuts.length === 0){
      emptyEl.textContent = 'No cuts found. Check that the pasted result contains 🦕 cut blocks.';
      emptyEl.classList.add('show');
      return;
    }

    var newCount = 0, sameCount = 0;
    var frag = document.createDocumentFragment();

    cuts.forEach(function(cut, idx){
      var isSame = cut.token === 'SAME SCENE';
      if(isSame) sameCount++; else newCount++;

      // Full description = scene description + framing line, counted together.
      var fullDesc = cut.scene + (cut.framing ? ' Camera framing: ' + cut.framing + '.' : '');

      // SAME SCENE cards never get the style prompt prepended.
      var fullCopy = (!isSame && stylePrompt ? stylePrompt + '\n\n' : '') + fullDesc;

      var card = document.createElement('article');
      card.className = 'card';
      card.style.animationDelay = Math.min(idx * 35, 400) + 'ms';

      var badgeClass = isSame ? 'same' : 'new';
      var badgeText  = cut.token || 'NEW SCENE';

      var descHtml = '';
      if(!isSame && stylePrompt){
        descHtml += '<span class="style-part">' + esc(stylePrompt) + '</span><hr class="divider">';
      }
      descHtml += '<span class="scene-part">' + esc(fullDesc) + '</span>';

      card.innerHTML =
        '<div class="card-head">' +
          '<span class="cut-no">🦕 ' + esc(cut.num) + '</span>' +
          '<span class="badge ' + badgeClass + '">' + esc(badgeText) + '</span>' +
          '<button class="btn btn-copy">' + COPY_ICON + '<span>Copy</span></button>' +
        '</div>' +
        (cut.vo ? '<div class="vo-line"><b>Line:</b> ' + esc(cut.vo) + '</div>' : '') +
        '<div class="card-body">' +
          '<div class="desc-box">' + descHtml + '</div>' +
          (cut.framing ? '<div class="framing">📷 <span>' + esc(cut.framing) + '</span></div>' : '') +
        '</div>';

      var copyBtn = card.querySelector('.btn-copy');
      copyBtn.addEventListener('click', function(){
        copyText(fullCopy, copyBtn);
      });

      frag.appendChild(card);

      // Animated connector when the next cut is SAME SCENE.
      var next = cuts[idx + 1];
      if(next && next.token === 'SAME SCENE'){
        card.classList.add('linked');
        var conn = document.createElement('div');
        conn.className = 'connector';
        frag.appendChild(conn);
      }
    });

    cardsEl.appendChild(frag);

    statusEl.innerHTML =
      '<span><b>' + cuts.length + '</b> cuts</span>' +
      '<span class="pill-new"><b>' + newCount + '</b> NEW SCENE</span>' +
      '<span class="pill-same"><b>' + sameCount + '</b> SAME SCENE</span>';
    statusEl.classList.add('show');
  }

  function copyText(text, btn){
    function done(ok){
      if(!ok) return;
      btn.classList.add('copied');
      btn.innerHTML = CHECK_ICON + '<span>Copied</span>';
      setTimeout(function(){
        btn.classList.remove('copied');
        btn.innerHTML = COPY_ICON + '<span>Copy</span>';
      }, 1400);
    }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(function(){done(true);}, function(){fallbackCopy(text, done);});
    } else {
      fallbackCopy(text, done);
    }
  }

  function fallbackCopy(text, cb){
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    var ok = false;
    try{ ok = document.execCommand('copy'); }catch(e){}
    document.body.removeChild(ta);
    cb(ok);
  }

  generateBtn.addEventListener('click', render);
  clearBtn.addEventListener('click', function(){
    resultInput.value = '';
    promptInput.value = '';
    cardsEl.innerHTML = '';
    statusEl.classList.remove('show');
    emptyEl.classList.remove('show');
    resultInput.focus();
  });
})();
</script>
</body>
</html>
